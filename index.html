function getPdfLib() {

  return new Promise((resolve, reject) => {

    script.onerror = () => reject(new Error("Failed to load pdf-lib"));
    document.head.appendChild(script);

}

// ─── PDF drawing helpers ──────────────────────────────────────────────────────

function hexRgb(hex, PDFLib) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return PDFLib.rgb(r, g, b);
}

// Draw the RMK logo block
function drawLogo(page, PDFLib, fonts, x, y, w, h) {
  const { rgb } = PDFLib;
  page.drawRectangle({ x, y: y-h, width: w, height: h, color: rgb(0.086,0.216,0.369) });
  page.drawText("RP",          { x: x+8,  y: y-h+h*0.42, size: Math.round(h*0.44), font: fonts.bold,    color: rgb(1,1,1) });
  page.drawText("RMK PRECAST", { x: x+4,  y: y-h+h*0.18, size: Math.round(h*0.13), font: fonts.bold,    color: rgb(1,1,1) });
  page.drawRectangle({ x, y: y-h, width: w, height: h*0.09, color: rgb(0.91,0.41,0.02) });
}

// Draw a labelled form field (label text above, outlined box below)
function drawField(page, PDFLib, fonts, label, value, x, y, w, h=16) {
  const { rgb } = PDFLib;
  page.drawText(label, { x, y: y+1, size: 7, font: fonts.bold, color: rgb(0,0,0) });
  page.drawRectangle({ x, y: y-h, width: w, height: h, borderColor: rgb(0.5,0.5,0.5), borderWidth: 0.5, color: rgb(1,1,1) });
  if (value != null && String(value).length > 0) {
    page.drawText(String(value), { x: x+3, y: y-h+4, size: 8, font: fonts.regular, color: rgb(0,0,0) });
  }
}

// Draw a single table row given an array of {x, w, text} col specs
function drawRow(page, PDFLib, fonts, cols, y, rh, style) {
  const { rgb } = PDFLib;
  const fills = {
    header:    rgb(0,0,0),
    subheader: hexRgb("#DCE6F1", PDFLib),
    total:     hexRgb("#E8E8E8", PDFLib),
    alt:       rgb(0.96,0.96,0.96),
    normal:    rgb(1,1,1),
  };
  const fill   = fills[style] || fills.normal;
  const tc     = style === "header" ? rgb(1,1,1) : rgb(0,0,0);
  const fnt    = (style === "header" || style === "total" || style === "subheader") ? fonts.bold : fonts.regular;
  const fs     = style === "header" ? 7 : 8;

  for (const col of cols) {
    page.drawRectangle({ x: col.x, y: y-rh, width: col.w, height: rh,
      color: fill, borderColor: rgb(0.6,0.6,0.6), borderWidth: 0.4 });
    const txt = col.text != null ? String(col.text) : "";
    if (txt) {
      const maxC = Math.floor((col.w - 4) / (fs * 0.58));
      const disp = txt.length > maxC ? txt.slice(0, maxC-1)+"…" : txt;
      page.drawText(disp, { x: col.x+2, y: y-rh+3, size: fs, font: fnt, color: tc });
    }
  }
}

// Word-wrap and draw a paragraph; returns final y
function drawWrapped(page, PDFLib, fonts, text, x, y, maxW, size, color) {
  const { rgb } = PDFLib;
  const words = text.split(" ");
  let line = "";
  const lh = size + 2;
  for (const w of words) {
    const test = line ? line+" "+w : w;
    if (fonts.regular.widthOfTextAtSize(test, size) > maxW) {
      page.drawText(line, { x, y, size, font: fonts.regular, color });
      y -= lh; line = w;
    } else { line = test; }
  }
  if (line) { page.drawText(line, { x, y, size, font: fonts.regular, color }); y -= lh; }
  return y;
}

async function generateDocketPDF(load, projectName, projectAddress, siteContact, truckLabel, loadDate, delivDate, carrier) {
  const fmtDate = d => d || "";
  const PDFLib = await getPdfLib();
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  const doc  = await PDFDocument.create();
  const page = doc.addPage([595, 842]);           // A4 portrait
  const { width, height } = page.getSize();
  const regular = await doc.embedFont(StandardFonts.Helvetica);
  const bold    = await doc.embedFont(StandardFonts.HelveticaBold);
  const fonts   = { regular, bold };
  const M = 36, cw = width - M*2;
  let y = height - M;

  // Logo (embedded JPEG)
  try {
    const logoBytes = Uint8Array.from(atob(RMK_LOGO_B64), ch => ch.charCodeAt(0));
    const logoImg   = await doc.embedJpg(logoBytes);
    page.drawImage(logoImg, { x: M, y: y-52, width: 52, height: 52 });
  } catch(e) {
    drawLogo(page, PDFLib, fonts, M, y, 92, 52);
  }

  // Docket number box (top-right)
  const dnW = 195, dnH = 20, dnX = width - M - dnW;
  page.drawRectangle({ x: dnX, y: y-dnH, width: dnW, height: dnH,
    color: rgb(1,1,1), borderColor: rgb(0,0,0), borderWidth: 1 });
  page.drawLine({ start:{x: dnX+88, y: y-dnH}, end:{x: dnX+88, y}, thickness:1, color: rgb(0,0,0) });
  page.drawText("DOCKET NUMBER", { x: dnX+3, y: y-13, size: 7, font: bold, color: rgb(0,0,0) });
  const docketNum = `${projectName}-RMK-${String(load.number).padStart(3,"0")}`;
  page.drawText(docketNum, { x: dnX+92, y: y-13, size: 8, font: regular, color: rgb(0,0,0) });

  // Title
  y -= 60;
  const title = "Load Docket";
  const tw = bold.widthOfTextAtSize(title, 18);
  page.drawText(title, { x: (width-tw)/2, y, size: 18, font: bold, color: rgb(0,0,0) });
  y -= 22;

  // Header fields — 3 columns
  const fc = cw/3, fh = 17, fg = 3;
  const row = (fields, rowY) => {
    fields.forEach(([lbl, val, rx, rw]) => drawField(page, PDFLib, fonts, lbl, val, rx, rowY, rw, fh));
  };
  row([["Project", projectName, M, fc-fg], ["Trailer Type", truckLabel||"", M+fc, fc-fg], ["Carrier", carrier||"", M+fc*2, fc]], y);
  y -= fh+8;
  row([["Load Date", fmtDate(loadDate), M, fc-fg], ["Load Number", load.number, M+fc, fc-fg], ["Site Contact", siteContact, M+fc*2, fc]], y);
  y -= fh+8;
  row([["Delivery Date", fmtDate(delivDate), M, fc-fg], ["On site Time", "", M+fc, fc-fg], ["Site Address", projectAddress, M+fc*2, fc]], y);
  y -= fh+8;

  // Arrival / Departure row (highlighted)
  drawField(page, PDFLib, fonts, "Actual Arrival Time", "", M, y, fc*1.5-fg, fh);
  page.drawRectangle({ x: M+fc*1.5, y: y-fh, width: fc*1.5, height: fh,
    color: hexRgb("#BDD7EE", PDFLib), borderColor: rgb(0.4,0.4,0.4), borderWidth:0.5 });
  page.drawText("Departure Time RMK", { x: M+fc*1.5+3, y: y-fh+5, size: 8, font: bold, color: rgb(0,0,0) });
  y -= fh+12;

  // Panel table
  const rh = 14;
  const TC = [
    { key:"panel",    label:"Panel\nNumber",     w: cw*0.21 },
    { key:"length",   label:"Q/A\nLength(mm)",   w: cw*0.15 },
    { key:"height",   label:"Q/A\nHeight(mm)",   w: cw*0.15 },
    { key:"mass",     label:"Mass(t)",            w: cw*0.12 },
    { key:"unload",   label:"Unload\nSequence",   w: cw*0.15 },
    { key:"comments", label:"COMMENTS",           w: cw*0.22 },
  ];
  let cx = M;
  TC.forEach(c => { c.x = cx; cx += c.w; });

  // Draw header (handle two-line labels)
  for (const col of TC) {
    page.drawRectangle({ x: col.x, y: y-rh, width: col.w, height: rh,
      color: rgb(0,0,0), borderColor: rgb(0.4,0.4,0.4), borderWidth:0.4 });
    const lines = col.label.split("\n");
    if (lines.length === 2) {
      page.drawText(lines[0], { x: col.x+2, y: y-rh+8, size: 6.5, font: bold, color: rgb(1,1,1) });
      page.drawText(lines[1], { x: col.x+2, y: y-rh+2, size: 6.5, font: bold, color: rgb(1,1,1) });
    } else {
      page.drawText(col.label, { x: col.x+2, y: y-rh+4, size: 6.5, font: bold, color: rgb(1,1,1) });
    }
  }
  y -= rh;

  let totalW = 0;
  for (let li = 0; li < 3; li++) {
    const lp = load.lanes[li];
    if (!lp || lp.length === 0) continue;
    const lbl = li === 0 ? "A" : li === 1 ? "B" : "C";

    // Lane sub-header
    drawRow(page, PDFLib, fonts,
      [{ x: M, w: cw, text: `  Lane ${lbl}  —  ${load.laneLength[li]} mm  /  ${lp.length} panel${lp.length!==1?"s":""}` }],
      y, rh, "subheader");
    y -= rh;

    lp.forEach((p, i) => {
      const style = i%2===1 ? "alt" : "normal";
      drawRow(page, PDFLib, fonts,
        TC.map(c => ({
          ...c,
          text: c.key==="panel"    ? p.productId
              : c.key==="length"   ? p.length
              : c.key==="height"   ? p.height
              : c.key==="mass"     ? p.mass.toFixed(1)
              : c.key==="unload"   ? i+1
              : "",
        })), y, rh, style);
      y -= rh;
      totalW += p.mass;
    });
  }

  // Total row
  drawRow(page, PDFLib, fonts,
    TC.map((c,i) => ({ ...c, text: i===2?"TOTAL": i===3?totalW.toFixed(1):"" })),
    y, rh, "total");
  y -= rh + 14;

  // Disclaimer
  const discH = 42;
  page.drawRectangle({ x: M, y: y-discH, width: cw, height: discH,
    borderColor: rgb(0.6,0.6,0.6), borderWidth:0.5, color: rgb(1,1,1) });
  drawWrapped(page, PDFLib, fonts,
    "I Hereby declare that I have confirmed the height and mass of the load. I have visibly checked all lashing and restraint for compliance with local road authority. Any damage caused during transit will be reported to RMK PRECAST. I acknowledge that this docket is evidence of the time and locations of my delivery and is to be true to all information recorded.",
    M+5, y-8, cw-10, 7, rgb(0.25,0.25,0.25));
  y -= discH + 14;

  // Fine print note
  page.drawText(
    "Copy of this docket is to be signed by the recipient on site. I acknowledge that without this signature the docket may be invalid.",
    { x: M, y, size: 6.5, font: regular, color: rgb(0.4,0.4,0.4) });
  y -= 10;

  // Signature fields (2 rows × 2 cols)
  const sigH = 32, hw = cw/2 - 4;
  for (const [l1, l2] of [["Driver Name","Driver Signature"],["Delivery Recipient Name","Recipient Signature"]]) {
    drawField(page, PDFLib, fonts, l1, "", M,        y, hw,   sigH);
    drawField(page, PDFLib, fonts, l2, "", M+hw+8,   y, hw,   sigH);
    y -= sigH + 10;
  }

  return await doc.save();
}

// ─── DISPATCH SHEET PDF (A4 landscape) ───────────────────────────────────────

async function generateDispatchPDF(loads, projectName, maxWeight, maxLength, loadTruckLabels, loadOverflow, loadTopLifters, panelSideLifters, panelNotes, panelTimeAtYard, panelTimeOnSite, loadDelivDates, loadTrucksMap, defaultTruckTypeId) {
  const PDFLib = await getPdfLib();
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  const doc     = await PDFDocument.create();
  const regular = await doc.embedFont(StandardFonts.Helvetica);
  const bold    = await doc.embedFont(StandardFonts.HelveticaBold);

  // Embed logo once
  let logoImg = null;
  try {
    const logoBytes = Uint8Array.from(atob(RMK_LOGO_B64), ch => ch.charCodeAt(0));
    logoImg = await doc.embedJpg(logoBytes);
  } catch(e) {}

  const NAVY   = hexRgb("#17375E", PDFLib);
  const ORANGE = hexRgb("#E8A020", PDFLib);
  const LGRAY  = hexRgb("#F4F6FA", PDFLib);
  const MGRAY  = hexRgb("#D8DCE6", PDFLib);
  const DTEXT  = hexRgb("#1A2A3A", PDFLib);
  const HBLUE  = hexRgb("#DCE6F1", PDFLib);

  const PAGE_W = 842, PAGE_H = 595;
  const M = 20, cw = PAGE_W - M*2;
  const HEADER_H = 56, FOOTER_H = 26, ROW_H = 15;
  const COL_ROW_H = 15;

  // Column definitions
  const TC = [
    { label:"Product",        w: cw*0.088 },
    { label:"Length (mm)",    w: cw*0.078 },
    { label:"Height (mm)",    w: cw*0.078 },
    { label:"Mass (T)",       w: cw*0.066 },
    { label:"Del. Seq",       w: cw*0.055 },
    { label:"Load No.",       w: cw*0.055 },
    { label:"Lane",           w: cw*0.044 },
    { label:"Time at Yard",   w: cw*0.090 },
    { label:"Time On Site",   w: cw*0.090 },
    { label:"Delivery Date",  w: cw*0.090 },
    { label:"Trailer Type",   w: cw*0.090 },
    { label:"Comment",        w: cw*0.176 },
  ];
  let colX = M;
  TC.forEach(col => { col.x = colX; colX += col.w; });

  const totalW      = loads.reduce((s,l) => s + l.totalWeight, 0);
  const summaryItems = [
    { label:"TOTAL PANELS",  val: String(loads.reduce((s,l)=>s+l.panels.length,0)) },
    { label:"TOTAL LOADS",   val: String(loads.length) },
    { label:"TOTAL WEIGHT",  val: totalW.toFixed(1) + " T" },
  ];
  const colW3 = cw / summaryItems.length;

  // ── Draw the black header bar (logo + project name) onto a page ──
  const drawPageHeader = (pg) => {
    const { width, height } = pg.getSize();
    pg.drawRectangle({ x:0, y: height - HEADER_H, width, height: HEADER_H, color: rgb(0,0,0) });
    const LOGO_W = 50, LOGO_H = 46;
    const LOGO_X = M, LOGO_Y = height - HEADER_H + (HEADER_H - LOGO_H) / 2;
    if (logoImg) {
      pg.drawImage(logoImg, { x: LOGO_X, y: LOGO_Y, width: LOGO_W, height: LOGO_H });
    } else {
      pg.drawText("RMK", { x: LOGO_X+4, y: height-HEADER_H+(HEADER_H/2)+2, size:12, font: bold, color: rgb(1,1,1) });
    }
    pg.drawLine({
      start: { x: LOGO_X + LOGO_W + 10, y: height - HEADER_H + 10 },
      end:   { x: LOGO_X + LOGO_W + 10, y: height - 10 },
      thickness: 0.5, color: rgb(1,1,1),
    });
    const TX = LOGO_X + LOGO_W + 18;
    pg.drawText(projectName,           { x: TX, y: height - 20, size: 12, font: bold,    color: rgb(1,1,1) });
    pg.drawText("Delivery Dispatch Sheet", { x: TX, y: height - 35, size: 9,  font: regular, color: rgb(1,1,1) });
  };

  // ── Draw the column header row at position y, return new y ──
  const drawColHeader = (pg, y) => {
    pg.drawRectangle({ x: M, y: y - COL_ROW_H, width: cw, height: COL_ROW_H, color: rgb(0,0,0) });
    TC.forEach(col => {
      pg.drawLine({ start:{x:col.x, y:y}, end:{x:col.x, y:y-COL_ROW_H}, thickness:0.3, color: rgb(0.3,0.3,0.3) });
      pg.drawText(col.label, { x: col.x+3, y: y-COL_ROW_H+4, size: 6.2, font: bold, color: rgb(1,1,1) });
    });
    return y - COL_ROW_H;
  };

  // ── Draw footer onto a page ──
  const drawFooter = (pg) => {
    pg.drawRectangle({ x: M, y: M, width: cw, height: FOOTER_H, color: rgb(0,0,0) });
    summaryItems.forEach((item, i) => {
      const cx = M + i * colW3 + colW3 / 2;
      const lw = regular.widthOfTextAtSize(item.label, 6.5);
      const vw = bold.widthOfTextAtSize(item.val, 11);
      pg.drawText(item.label, { x: cx - lw/2, y: M + FOOTER_H - 10, size: 6.5, font: regular, color: rgb(1,1,1) });
      pg.drawText(item.val,   { x: cx - vw/2, y: M + 4,              size: 11,  font: bold,    color: rgb(1,1,1) });
      if (i < summaryItems.length - 1) {
        pg.drawLine({
          start: { x: M + colW3*(i+1), y: M+3 },
          end:   { x: M + colW3*(i+1), y: M+FOOTER_H-3 },
          thickness: 0.5, color: rgb(0.3,0.3,0.3),
        });
      }
    });
  };

  // ── Start first page ──
  const newPage = () => {
    const pg = doc.addPage([PAGE_W, PAGE_H]);
    drawPageHeader(pg);
    const startY = PAGE_H - HEADER_H - 10;
    const y = drawColHeader(pg, startY);
    return { pg, y };
  };

  let { pg: page, y } = newPage();
  const BOTTOM_LIMIT = M + FOOTER_H + 4;

  // ── All panels sorted by delivery sequence ──
  const allPanels = loads
    .flatMap(l => l.lanes.flatMap((lane, li) =>
      lane.map(p => ({ ...p, loadNumber: l.number, lane: li===0?"A":li===1?"B":"C" }))
    ))
    .sort((a,b) => a.deliverySequence - b.deliverySequence);

  const charPx = 7 * 0.58;
  const commentCol = TC[11];
  const maxCharsPerLine = Math.floor((commentCol.w - 6) / charPx);
  const wrapLines = (txt) => {
    if (!txt) return [];
    const words = txt.split(" ");
    const lines = []; let line = "";
    for (const w of words) {
      const test = line ? line + " " + w : w;
      if (test.length > maxCharsPerLine) { if (line) lines.push(line); line = w; }
      else line = test;
    }
    if (line) lines.push(line);
    return lines;
  };

  let prevLoad = null;
  let rowIndex = 0;

  for (const p of allPanels) {
    const newLoad = p.loadNumber !== prevLoad;

    const commentTxt = (() => {
      const parts = [];
      if (newLoad && loadOverflow && loadOverflow[p.loadNumber]) parts.push("Review Truck Type!");
      if (panelSideLifters && panelSideLifters[p.productId]) {
        const facing = (loadTopLifters && loadTopLifters[p.productId]) || "Front of Truck";
        parts.push("Top Lifters: " + facing);
      }
      if (panelNotes && panelNotes[p.productId]) parts.push(panelNotes[p.productId]);
      return parts.join(" | ");
    })();

    const commentLines = wrapLines(commentTxt);
    const lineH = 8;
    const rowH = Math.max(ROW_H, commentLines.length * lineH + 4);

    // ── Paginate: if row won't fit, close current page and start a new one ──
    if (y - rowH < BOTTOM_LIMIT) {
      drawFooter(page);
      ({ pg: page, y } = newPage());
      prevLoad = null; // force Load No. to reprint on new page
    }

    const rowBg = rowIndex % 2 === 0 ? LGRAY : rgb(1,1,1);
    page.drawRectangle({ x: M, y: y-rowH, width: cw, height: rowH, color: rowBg });

    const isNewLoadOnPage = p.loadNumber !== prevLoad;
    if (isNewLoadOnPage) {
      page.drawRectangle({ x: TC[5].x, y: y-rowH, width: TC[5].w, height: rowH, color: HBLUE });
    }

    TC.forEach(col => {
      page.drawRectangle({ x: col.x, y: y-rowH, width: col.w, height: rowH,
        borderColor: MGRAY, borderWidth: 0.25 });
    });

    if (isNewLoadOnPage && rowIndex > 0) {
      page.drawLine({ start:{x:M, y:y}, end:{x:M+cw, y:y}, thickness:1.2, color: rgb(0,0,0) });
    }

    const vals = [
      p.productId, String(p.length), String(p.height), p.mass.toFixed(1),
      String(p.deliverySequence), isNewLoadOnPage ? String(p.loadNumber) : "", p.lane,
      (panelTimeAtYard&&panelTimeAtYard[p.productId])||"",
      (panelTimeOnSite&&panelTimeOnSite[p.productId])||"",
      (isNewLoadOnPage&&loadDelivDates&&loadDelivDates[p.loadNumber])||"",
      (isNewLoadOnPage&&loadTruckLabels&&loadTruckLabels[p.loadNumber])||"",
    ];
    const textY = y - rowH + (rowH - 7) / 2;
    TC.forEach((col, ci) => {
      if (ci === 11) return;
      const txt = vals[ci];
      if (!txt) return;
      const isBoldCell = ci === 0 || (ci === 5 && isNewLoadOnPage);
      const cellColor  = ci === 0 ? rgb(0,0,0)
                       : ci === 6 ? ORANGE
                       : (ci === 5 && isNewLoadOnPage) ? rgb(0,0,0)
                       : DTEXT;
      const maxC = Math.floor((col.w - 5) / charPx);
      const disp = txt.length > maxC ? txt.slice(0, maxC-1)+"…" : txt;
      page.drawText(disp, { x: col.x+3, y: textY, size: 7,
        font: isBoldCell ? bold : regular, color: cellColor });
    });

    if (commentLines.length > 0) {
      const commentColor = commentTxt.startsWith("Review Truck")
        ? hexRgb("#C00000", PDFLib) : DTEXT;
      commentLines.forEach((line, li) => {
        page.drawText(line, {
          x: commentCol.x + 3,
          y: y - 4 - lineH * li - 7,
          size: 7, font: regular, color: commentColor,
        });
      });
    }

    prevLoad = p.loadNumber;
    y -= rowH;
    rowIndex++;
  }

  // Footer on last page
  drawFooter(page);

  return await doc.save();
}
// ─── Download helper ──────────────────────────────────────────────────────────

function downloadPDF(bytes, filename) {
  const blob = new Blob([bytes], { type: "application/pdf" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// ─── Load assignment: 2-lane bin-packing ─────────────────────────────────────

function assignLoads(panels, maxWeight, maxLength, laneLen) {
  const sorted = [...panels].sort((a,b) => a.deliverySequence - b.deliverySequence);
  const loads  = [];
  const newLoad = n => ({ number:n, lanes:[[],[],[]], laneLength:[0,0,0], totalWeight:0, panels:[] });
  let cur = newLoad(1);
  // laneLen: function that returns the dimension used for lane accumulation per panel
  // default = p.length; if side lifters → p.height (panel transported rotated)
  const pLen = laneLen || (p => (p.length||0));
  const close = () => {
    cur.panels = [...cur.lanes[0],...cur.lanes[1],...cur.lanes[2]].sort((a,b)=>a.deliverySequence-b.deliverySequence);
    loads.push(cur);
  };
  for (const panel of sorted) {
    const pl = pLen(panel), pw = panel.mass||0;
    const wOk = cur.totalWeight+pw <= maxWeight;
    const l0  = cur.laneLength[0]+pl <= maxLength;
    const l1  = cur.laneLength[1]+pl <= maxLength;
    const l2  = cur.laneLength[2]+pl <= maxLength;
    if (wOk && (l0||l1||l2)) {
      // pick least-full available lane
      const avail = [l0?0:-1, l1?1:-1, l2?2:-1].filter(x=>x>=0);
      const t = avail.reduce((best,li) => cur.laneLength[li]<cur.laneLength[best]?li:best, avail[0]);
      cur.lanes[t].push(panel); cur.laneLength[t]+=pl; cur.totalWeight+=pw;
    } else {
      close(); cur=newLoad(loads.length+1);
      cur.lanes[0].push(panel); cur.laneLength[0]+=pl; cur.totalWeight+=pw;
    }
  }
  if (cur.lanes[0].length+cur.lanes[1].length+cur.lanes[2].length>0) close();
  return loads;
}

// ─── Excel parser ─────────────────────────────────────────────────────────────

function parseExcel(buffer) {
  const wb = XLSX.read(buffer, { type:"array", cellDates:true });
  const gdRows = XLSX.utils.sheet_to_json(wb.Sheets["General Data"], { header:1 });
  let maxWeight=22.5, maxLength=13000, projectName="", projectAddress="";
  let panelTypes=[];
  for (const row of gdRows) {
    if (row[0]==="Project name")       projectName    = row[1]||"";
    if (row[0]==="Project address")    projectAddress = row[1]||"";
    if (row[0]==="Overweight limit (T)") maxWeight = parseFloat(row[1])||22.5;
    if (row[0]==="Maximum length (mm)") maxLength  = parseFloat(row[1])||13000;
    if (typeof row[0]==="number"&&row[1]&&row[2]&&row[3])
      panelTypes.push({type:row[0],maxHeight:row[1],maxLength:row[2],trailerType:row[3]});
  }
  const pdRows = XLSX.utils.sheet_to_json(wb.Sheets["Production Data HUB"], { header:1 });
  const hdrs   = pdRows[0];
  const panels = [];
  for (let i=1;i<pdRows.length;i++) {
    const row = pdRows[i];
    if (!row||row.every(v=>v==null||v==="")) continue;
    const g = n => { const idx=hdrs.indexOf(n); return idx>=0?row[idx]:undefined; };
    const seq = g("Delivery Sequence");
    if (seq==null||seq==="") continue;
    panels.push({
      productId: g("Product ID")||"",
      level:     g("Level")||"",
      length:    parseFloat(g("Length(mm)"))||0,
      height:    parseFloat(g("Height(mm)"))||0,
      mass:      parseFloat(g("Mass (T)"))||0,
      deliverySequence: parseInt(seq),
      sideLiftable: String(g("Side lifters?")||"").toLowerCase() === "yes",
    });
  }
  return { maxWeight, maxLength, projectName, projectAddress, panelTypes, panels };
}

function Btn({ label, bg, border, tc="#000", onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: bg, border:`1px solid ${border||"transparent"}`,
      borderRadius:7, padding:"8px 16px", color: tc,
      cursor: disabled?"not-allowed":"pointer", fontSize:12, fontWeight:700,
      opacity: disabled?0.6:1, transition:"opacity 0.2s", whiteSpace:"nowrap",
    }}>{label}</button>
  );
}
function MiniBar({ label, pct, color }) {
  return <>
    <div style={{marginTop:5, fontSize:10, color:P.muted}}>{label}</div>
    <div style={{height:4, background:P.border, borderRadius:2, marginTop:2}}>
      <div style={{height:"100%", width:pct+"%", background:color, borderRadius:2, transition:"width 0.3s"}}/>
    </div>
  </>;
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [step,         setStep]         = useState("upload");
  const [data,         setData]         = useState(null);
  const [loads,        setLoads]        = useState([]);
  const [config,       setConfig]       = useState({ projectName:"", siteContact:"", projectAddress:"", truckTypeId:"flatbed", maxWeight:22.5 });
  const [sideLifters,  setSideLifters]  = useState({});  // { productId: bool }
  const [topLifters,   setTopLifters]   = useState({});  // { productId: 'Front of Truck'|'Back of Truck' }
  const [activeLoad,   setActiveLoad]   = useState(null);
  const [loadTrucks,      setLoadTrucks]      = useState({});  // { loadNumber: truckTypeId }
  const [loadDates,       setLoadDates]       = useState({});  // { loadNumber: "DD/MM/YYYY" }
  const [loadDelivDates,  setLoadDelivDates]  = useState({});  // { loadNumber: "DD/MM/YYYY" }
  const [loadCarriers,    setLoadCarriers]    = useState({});  // { loadNumber: string }
  const [panelNotes,      setPanelNotes]      = useState({});  // { productId: string }
  const [panelTimeAtYard,  setPanelTimeAtYard]  = useState({});  // { productId: string }
  const [panelTimeOnSite,  setPanelTimeOnSite]  = useState({});  // { productId: string }
  const [showDispatchPreview, setShowDispatchPreview] = useState(false);
  const [showEmailModal,      setShowEmailModal]      = useState(false);
  const [emailAddresses,      setEmailAddresses]      = useState("");
  const [emailSubject,        setEmailSubject]        = useState("");
  const [emailBody,           setEmailBody]           = useState("");
  const [emailBusy,           setEmailBusy]           = useState(false);
  const [emailStep,           setEmailStep]           = useState("compose"); // compose | ready


  const openPicker = (ref) => { try { ref.current.showPicker(); } catch(e) { ref.current.click(); } };
  const onPickDate = (setter) => (e) => {
    if (!e.target.value) return;
    const [y,m,d] = e.target.value.split("-");
    setter(prev => ({...prev, [activeLoad?.number]: `${d}/${m}/${y}`}));
    e.target.value = "";
  };

  // ── Manager approval state ──
  const [mgrPanel,      setMgrPanel]      = useState(false);   // manager panel open
  const [approvalState, setApprovalState] = useState("locked"); // locked|requested|unlocked
  const [requestCode,   setRequestCode]   = useState("");       // shown to user
  const [unlockInput,   setUnlockInput]   = useState("");       // user enters unlock code
  const [mgrPinInput,   setMgrPinInput]   = useState("");       // manager enters PIN
  const [mgrReqInput,   setMgrReqInput]   = useState("");       // manager enters request code
  const [mgrError,      setMgrError]      = useState("");
  const [unlockError,   setUnlockError]   = useState("");
  const [unlockExpiry,  setUnlockExpiry]  = useState(null);     // timestamp

  const MANAGER_PIN_HASH = "57d24fbc37a0596d5dbad9f86accacf04ab8e2875a084cb2202244c421d1c65f";

  const sha256 = async (msg) => {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  };

  // Generate a 6-char alphanumeric request code from timestamp
  const genRequestCode = () => {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    const t = Date.now().toString(36).toUpperCase();
    let code = "";
    for (let i = 0; i < 6; i++) code += chars[(t.charCodeAt(i % t.length) + i * 7) % chars.length];
    return code;
  };

  // Derive unlock code from PIN hash + request code + 30-min window
  const deriveUnlockCode = async (reqCode) => {
    const window30 = Math.floor(Date.now() / (30 * 60 * 1000));
    const raw = MANAGER_PIN_HASH + reqCode + window30;
    const hash = await sha256(raw);
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 8; i++) code += chars[parseInt(hash.slice(i*2, i*2+2), 16) % chars.length];
    return code;
  };

  const handleRequestChange = () => {
    const rc = genRequestCode();
    setRequestCode(rc);
    setApprovalState("requested");
    setUnlockError("");
  };

  const handleManagerApprove = async () => {
    setMgrError("");
    const pinHash = await sha256(mgrPinInput);
    if (pinHash !== MANAGER_PIN_HASH) { setMgrError("Incorrect PIN."); return; }
    if (!mgrReqInput.trim()) { setMgrError("Enter the request code."); return; }
    const unlockCode = await deriveUnlockCode(mgrReqInput.trim().toUpperCase());
    setMgrError("Unlock code generated: " + unlockCode);
    setMgrPinInput("");
  };

  const handleUnlockSubmit = async () => {
    setUnlockError("");
    if (!requestCode) return;
    const expected = await deriveUnlockCode(requestCode);
    if (unlockInput.trim().toUpperCase() === expected) {
      setApprovalState("unlocked");
      setUnlockExpiry(Date.now() + 30 * 60 * 1000);
      setUnlockInput("");
    } else {
      setUnlockError("Invalid unlock code. Ask your manager to generate one.");
    }
  };

  // Re-lock after edit
  const handleMaxWeightChange = (val) => {
    setConfig(cfg => ({...cfg, maxWeight: val}));
  };

  const handleMaxWeightBlur = () => {
    if (approvalState === "unlocked") {
      setApprovalState("locked");
      setRequestCode("");
      setUnlockExpiry(null);
    }
  };

  const handleMgrPanelKey = useCallback((e) => {
    if (e.ctrlKey && e.shiftKey && e.key === "M") setMgrPanel(p => !p);
  }, []);

  // Listen for Ctrl+Shift+M to open manager panel
  useState(() => {
    document.addEventListener("keydown", handleMgrPanelKey);
    return () => document.removeEventListener("keydown", handleMgrPanelKey);
  });

  // Move a panel between Lane A and Lane B within the same load
  const movePanel = (loadNumber, panelId, fromLane, toLane) => {
    setLoads(prev => {
      const next = prev.map(l => {
        if (l.number !== loadNumber) return l;
        const newLanes = l.lanes.map(lane => [...lane]);
        const panel = newLanes[fromLane].find(p => p.productId === panelId);
        if (!panel) return l;
        newLanes[fromLane] = newLanes[fromLane].filter(p => p.productId !== panelId);
        newLanes[toLane]   = [...newLanes[toLane], panel];
        const laneLength = newLanes.map(lane =>
          lane.reduce((s, p) => s + (sideLifters[p.productId] ? (p.height||0) : (p.length||0)), 0)
        ); // 3 lanes
        const panels = [...newLanes[0], ...newLanes[1], ...newLanes[2]].sort((a,b) => a.deliverySequence - b.deliverySequence);
        return { ...l, lanes: newLanes, laneLength, panels };
      });
      // Keep activeLoad in sync
      const updated = next.find(l => l.number === loadNumber);
      if (updated) setActiveLoad(updated);
      return next;
    });
  };

  const handleDateInput = (setter, key) => (e) => {
    let raw = e.target.value.replace(/[^0-9]/g, "").slice(0, 8);
    let out = "";
    if (raw.length > 0) out += raw.slice(0, 2);
    if (raw.length > 2) out += "/" + raw.slice(2, 4);
    if (raw.length > 4) out += "/" + raw.slice(4, 8);
    setter(d => ({ ...d, [key]: out }));
  };
  const [selectedPanels,   setSelectedPanels]   = useState(new Set()); // for bulk side-lifter toggle
  const [selectedTLPanels, setSelectedTLPanels] = useState(new Set()); // for bulk top-lifter toggle

  const [dragOver,     setDragOver]     = useState(false);
  const [error,        setError]        = useState("");
  const [busy,         setBusy]         = useState("");
  const fileRef    = useRef();
  const sessionRef = useRef();

  const saveSession = () => {
    const session = {
      version: 1,
      step, config, data, loads, sideLifters, topLifters,
      loadTrucks, loadDates, loadDelivDates, loadCarriers, panelNotes,
      panelTimeAtYard, panelTimeOnSite,
    };
    const blob = new Blob([JSON.stringify(session, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = `${config.projectName || "RMK"}_session.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  };

  const loadSession = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const s = JSON.parse(e.target.result);
        if (s.version !== 1) { alert("Unrecognised session file."); return; }
        if (s.step)           setStep(s.step);
        if (s.config)         setConfig(s.config);
        if (s.data)           setData(s.data);
        if (s.loads)          setLoads(s.loads);
        if (s.sideLifters)    setSideLifters(s.sideLifters);
        if (s.topLifters)     setTopLifters(s.topLifters);
        if (s.loadTrucks)     setLoadTrucks(s.loadTrucks);
        if (s.loadDates)      setLoadDates(s.loadDates);
        if (s.loadDelivDates) setLoadDelivDates(s.loadDelivDates);
        if (s.loadCarriers)   setLoadCarriers(s.loadCarriers);
        if (s.panelNotes)     setPanelNotes(s.panelNotes);
        if (s.panelTimeAtYard)  setPanelTimeAtYard(s.panelTimeAtYard);
        if (s.panelTimeOnSite)  setPanelTimeOnSite(s.panelTimeOnSite);
        if (s.loads && s.loads.length > 0) setActiveLoad(s.loads[0]);
      } catch(err) { alert("Could not read session file: " + err.message); }
    };
    reader.readAsText(file);
  };

  const processFile = useCallback((file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = parseExcel(new Uint8Array(e.target.result));
        if (!parsed.panels.length) { setError("No panels found in 'Production Data HUB'. Check Delivery Sequence is filled."); return; }
        setData(parsed);
        setConfig({ projectName: parsed.projectName||"", siteContact:"", projectAddress: parsed.projectAddress||"", truckTypeId:"flatbed", maxWeight: parsed.maxWeight||22.5 });
        // Initialise sideLifters from spreadsheet data
        const initSL = {};
        parsed.panels.forEach(p => { initSL[p.productId] = false; });
        setSideLifters(initSL);
        setStep("config"); setError("");
      } catch(err) { setError("Failed to parse: "+err.message); }
    };
    reader.readAsArrayBuffer(file);
  }, []);

  const handleDrop = e => { e.preventDefault(); setDragOver(false); const f=e.dataTransfer.files[0]; if(f) processFile(f); };

  const handleGenerate = () => {
    const truck = TRUCK_TYPES.find(t => t.id === config.truckTypeId) || TRUCK_TYPES[2];
    const getLaneLen = p => sideLifters[p.productId] ? (p.height||0) : (p.length||0);
    const result = assignLoads(data.panels, parseFloat(config.maxWeight)||22.5, truck.maxLength, getLaneLen);
    const initTrucks = {};
    result.forEach(l => { initTrucks[l.number] = config.truckTypeId; });
    setLoadTrucks(initTrucks);
    setLoads(result); setActiveLoad(result[0]||null); setStep("results");
  };

  const dlDispatch = async () => {
    setBusy("dispatch");
    try {
      const truckLabels = {};
      const overflowMap = {};
      loads.forEach(l => {
        const tid = loadTrucks[l.number] || config.truckTypeId;
        const lt = TRUCK_TYPES.find(t => t.id === tid) || truck;
        truckLabels[l.number] = lt.label;
        overflowMap[l.number] = l.laneLength[0] > lt.maxLength || l.laneLength[1] > lt.maxLength || l.laneLength[2] > lt.maxLength;
      });
      downloadPDF(await generateDispatchPDF(loads, config.projectName, parseFloat(config.maxWeight)||22.5, (TRUCK_TYPES.find(t=>t.id===config.truckTypeId)||TRUCK_TYPES[2]).maxLength, truckLabels, overflowMap, topLifters, sideLifters, panelNotes, panelTimeAtYard, panelTimeOnSite, loadDelivDates, loadTrucks, config.truckTypeId), `${config.projectName}_Dispatch_Sheet.pdf`);
    }
    catch(e) { setError("PDF error: "+e.message); }
    setBusy("");
  };

  const dlDocket = async (load) => {
    setBusy("d"+load.number);
    const loadTruck = TRUCK_TYPES.find(t => t.id === (loadTrucks[load.number] || config.truckTypeId)) || truck;
    try { downloadPDF(await generateDocketPDF(load, config.projectName, config.projectAddress, config.siteContact, loadTruck.label, loadDates[load.number], loadDelivDates[load.number], loadCarriers[load.number]), `${config.projectName}_Docket_${load.number}.pdf`); }
    catch(e) { setError("PDF error: "+e.message); }
    setBusy("");
  };

  const dlAll = async () => {
    setBusy("all");
    try {
      const PDFLib = await getPdfLib();
      const { PDFDocument } = PDFLib;
      const merged = await PDFDocument.create();
      for (const load of loads) {
        const loadTruck = TRUCK_TYPES.find(t => t.id === (loadTrucks[load.number] || config.truckTypeId)) || truck;
        const bytes = await generateDocketPDF(load, config.projectName, config.projectAddress, config.siteContact, loadTruck.label, loadDates[load.number], loadDelivDates[load.number], loadCarriers[load.number]);
        const src   = await PDFDocument.load(bytes);
        const [pg]  = await merged.copyPages(src, [0]);
        merged.addPage(pg);
      }
      downloadPDF(await merged.save(), `${config.projectName}_All_Dockets.pdf`);
    } catch(e) { setError("PDF error: "+e.message); }
    setBusy("");
  };

  const openEmailModal = () => {
    setEmailSubject(`${config.projectName} — Dispatch Sheet & Load Dockets`);
    setEmailBody(
      `Hi,\n\nPlease find attached the Delivery Dispatch Sheet and all Load Dockets for ${config.projectName}.\n\nAttachments:\n• ${config.projectName}_Dispatch_Sheet.pdf\n• ${config.projectName}_All_Dockets.pdf\n\nRegards,\nRMK Precast`
    );
    setEmailStep("compose");
    setEmailAddresses("");
    setShowEmailModal(true);
  };

  const handleEmailSend = async () => {
    setEmailBusy(true);
    try {
      // Generate dispatch PDF
      const truckLabels = {}, overflowMap = {};
      loads.forEach(l => {
        const tid = loadTrucks[l.number] || config.truckTypeId;
        const lt = TRUCK_TYPES.find(t => t.id === tid) || truck;
        truckLabels[l.number] = lt.label;
        overflowMap[l.number] = l.laneLength[0]>lt.maxLength||l.laneLength[1]>lt.maxLength||l.laneLength[2]>lt.maxLength;
      });
      const dispatchBytes = await generateDispatchPDF(loads, config.projectName, parseFloat(config.maxWeight)||22.5, (TRUCK_TYPES.find(t=>t.id===config.truckTypeId)||TRUCK_TYPES[2]).maxLength, truckLabels, overflowMap, topLifters, sideLifters, panelNotes, panelTimeAtYard, panelTimeOnSite, loadDelivDates, loadTrucks, config.truckTypeId);

      // Generate merged dockets PDF
      const PDFLib = await getPdfLib();
      const { PDFDocument } = PDFLib;
      const merged = await PDFDocument.create();
      for (const load of loads) {
        const loadTruck = TRUCK_TYPES.find(t => t.id === (loadTrucks[load.number] || config.truckTypeId)) || truck;
        const bytes = await generateDocketPDF(load, config.projectName, config.projectAddress, config.siteContact, loadTruck.label, loadDates[load.number], loadDelivDates[load.number], loadCarriers[load.number]);
        const src = await PDFDocument.load(bytes);
        const [pg] = await merged.copyPages(src, [0]);
        merged.addPage(pg);
      }
      const docketsBytes = await merged.save();

      // Download both files
      downloadPDF(dispatchBytes, `${config.projectName}_Dispatch_Sheet.pdf`);
      await new Promise(r => setTimeout(r, 600));
      downloadPDF(docketsBytes, `${config.projectName}_All_Dockets.pdf`);

      setEmailStep("ready");
    } catch(e) {
      setError("Email prep error: " + e.message);
    }
    setEmailBusy(false);
  };

  const fireMailto = () => {
    const to = emailAddresses.split(/[,;\n]+/).map(s=>s.trim()).filter(Boolean).join(",");
    const subject = encodeURIComponent(emailSubject);
    const body    = encodeURIComponent(emailBody + "\n\n(Please attach the downloaded PDF files before sending.)");
    window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
  };

  const truck = TRUCK_TYPES.find(t => t.id === config.truckTypeId) || TRUCK_TYPES[2];

  return (
    <>
      <style>{globalCss}</style>
      <input ref={sessionRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{loadSession(e.target.files[0]); e.target.value="";}} />
      {mgrPanel && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>{setMgrPanel(false);setMgrError("");setMgrPinInput("");setMgrReqInput("");}}>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:12,padding:28,width:340,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:P.accentLight,marginBottom:4}}>Manager Panel</div>
            <div style={{fontSize:11,color:P.muted,marginBottom:20}}>Enter PIN and request code to generate an unlock code for the operator.</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Manager PIN</div>
              <input type="password" placeholder="••••••••"
                value={mgrPinInput}
                onChange={e=>setMgrPinInput(e.target.value)}
                style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"8px 10px",color:P.text,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Operator Request Code</div>
              <input type="text" placeholder="e.g. X4KR2P" maxLength={6}
                value={mgrReqInput}
                onChange={e=>setMgrReqInput(e.target.value.toUpperCase())}
                style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"8px 10px",color:P.text,fontSize:14,outline:"none",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:3}}/>
            </div>
            <button onClick={handleManagerApprove}
              style={{width:"100%",padding:"10px",background:P.accent,border:"none",borderRadius:6,color:"#000",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:12}}>
              Generate Unlock Code
            </button>
            {mgrError && (
              <div style={{textAlign:"center",fontFamily:"'IBM Plex Mono',monospace",fontSize:13,
                color: mgrError.startsWith("Unlock") ? P.accentLight : P.danger,
                fontWeight: mgrError.startsWith("Unlock") ? 700 : 400,
                letterSpacing: mgrError.startsWith("Unlock") ? 2 : 0,
                padding:"8px",background:P.surface,borderRadius:6}}>
                {mgrError}
              </div>
            )}
            <div style={{marginTop:16,fontSize:10,color:P.muted,textAlign:"center"}}>Press Ctrl+Shift+M to close</div>
          </div>
        </div>
      )}
      <div style={{minHeight:"100vh", background:P.bg}}>

        {/* ── Email Modal ── */}
        {showEmailModal && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
            onClick={()=>setShowEmailModal(false)}>
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:14,padding:28,width:"100%",maxWidth:520,boxShadow:"0 12px 48px rgba(0,0,0,0.6)"}}
              onClick={e=>e.stopPropagation()}>

              {/* Modal header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:P.accentLight}}>✉ Email Documents</div>
                  <div style={{fontSize:11,color:P.muted,marginTop:2}}>Dispatch Sheet + All Load Dockets</div>
                </div>
                <button onClick={()=>setShowEmailModal(false)}
                  style={{background:"transparent",border:`1px solid ${P.border}`,borderRadius:6,padding:"4px 10px",color:P.muted,fontSize:13,cursor:"pointer"}}>✕</button>
              </div>

              {emailStep === "compose" ? (<>

                {/* To */}
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>To — Recipients</div>
                  <textarea
                    placeholder="email@example.com, another@example.com"
                    value={emailAddresses}
                    onChange={e=>setEmailAddresses(e.target.value)}
                    rows={2}
                    style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${emailAddresses.trim()?P.accent:P.border}`,borderRadius:6,padding:"8px 10px",color:P.text,fontSize:12,outline:"none",resize:"vertical",fontFamily:"'Barlow',sans-serif"}}/>
                  <div style={{fontSize:10,color:P.muted,marginTop:3}}>Separate multiple addresses with commas or new lines.</div>
                </div>

                {/* Subject */}
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Subject</div>
                  <input type="text"
                    value={emailSubject}
                    onChange={e=>setEmailSubject(e.target.value)}
                    style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"8px 10px",color:P.text,fontSize:12,outline:"none"}}/>
                </div>

                {/* Body */}
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Message Body</div>
                  <textarea
                    value={emailBody}
                    onChange={e=>setEmailBody(e.target.value)}
                    rows={6}
                    style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"8px 10px",color:P.text,fontSize:12,outline:"none",resize:"vertical",fontFamily:"'Barlow',sans-serif",lineHeight:1.5}}/>
                </div>

                {/* Attachments info */}
                <div style={{background:P.surface,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 14px",marginBottom:20}}>
                  <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>📎 Attachments to be generated & downloaded</div>
                  {[
                    `${config.projectName}_Dispatch_Sheet.pdf`,
                    `${config.projectName}_All_Dockets.pdf`,
                  ].map(f=>(
                    <div key={f} style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                      <span style={{fontSize:13,color:P.danger}}>📄</span>
                      <span style={{fontSize:11,color:P.text,fontFamily:"'IBM Plex Mono'"}}>{f}</span>
                    </div>
                  ))}
                  <div style={{fontSize:10,color:P.muted,marginTop:6,lineHeight:1.5}}>
                    Both PDFs will download automatically. Your email client will open pre-filled — attach the downloaded files before sending.
                  </div>
                </div>

                <button
                  onClick={handleEmailSend}
                  disabled={emailBusy || !emailAddresses.trim()}
                  style={{width:"100%",padding:"11px",background:emailAddresses.trim()?P.accent:"#444",border:"none",borderRadius:7,color:emailAddresses.trim()?"#000":"#888",fontSize:13,fontWeight:700,cursor:emailAddresses.trim()?"pointer":"not-allowed",letterSpacing:0.5,transition:"all 0.2s"}}>
                  {emailBusy ? "⏳ Generating PDFs…" : "⬇ Generate PDFs & Prepare Email"}
                </button>

              </>) : (<>

                {/* Ready step */}
                <div style={{textAlign:"center",padding:"10px 0 20px"}}>
                  <div style={{fontSize:36,marginBottom:12}}>✅</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:P.success,marginBottom:6}}>PDFs Downloaded!</div>
                  <div style={{fontSize:12,color:P.muted,lineHeight:1.6,marginBottom:20}}>
                    Both files have been saved to your downloads folder.<br/>
                    Click below to open your email client — then attach the PDFs before sending.
                  </div>
                  {/* File reminder */}
                  <div style={{background:P.surface,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 14px",marginBottom:20,textAlign:"left"}}>
                    <div style={{fontSize:10,color:P.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>📎 Attach these files:</div>
                    {[
                      `${config.projectName}_Dispatch_Sheet.pdf`,
                      `${config.projectName}_All_Dockets.pdf`,
                    ].map(f=>(
                      <div key={f} style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                        <span style={{color:P.danger}}>📄</span>
                        <span style={{fontSize:11,color:P.accentLight,fontFamily:"'IBM Plex Mono'"}}>{f}</span>
                      </div>
                    ))}
                  </div>
                  <button onClick={fireMailto}
                    style={{width:"100%",padding:"11px",background:P.accent,border:"none",borderRadius:7,color:"#000",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:0.5,marginBottom:10}}>
                    ✉ Open Email Client
                  </button>
                  <button onClick={()=>setEmailStep("compose")}
                    style={{width:"100%",padding:"8px",background:"transparent",border:`1px solid ${P.border}`,borderRadius:7,color:P.muted,fontSize:11,cursor:"pointer"}}>
                    ← Edit Message
                  </button>
                </div>

              </>)}
            </div>
          </div>
        )}

        {/* ── Header ── */}
        <div style={{background:P.surface, borderBottom:`2px solid ${P.accent}`, padding:"12px 24px", display:"flex", alignItems:"center", gap:16}}>
          <div style={{width:8, height:36, background:P.accent, borderRadius:2}}/>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:700, letterSpacing:2, color:P.accentLight}}>RMK PRECAST</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:13, color:P.muted, letterSpacing:3, textTransform:"uppercase"}}>Transport Schedule Generator</div>
          </div>
          <div style={{marginLeft:"auto", display:"flex", gap:8}}>
            {["upload","config","review","results"].map((s,i)=>{
              const order = ["upload","config","review","results"];
              const done = order.indexOf(step) > i;
              return (
                <div key={s} style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:step===s?P.accent:done?P.success:P.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:step===s||done?"#000":P.muted}}>
                    {done?"✓":i+1}
                  </div>
                  <span style={{fontSize:11,color:step===s?P.accentLight:P.muted,textTransform:"uppercase",letterSpacing:1}}>{s}</span>
                  {i<3&&<span style={{color:P.border}}>›</span>}
                </div>
              );
            })}
          </div>
        </div>

        <div style={{maxWidth:1100, margin:"0 auto", padding:24}}>
          {error&&(
            <div style={{background:"#3a1a1a",border:`1px solid ${P.danger}`,borderRadius:8,padding:"12px 16px",marginBottom:16,color:"#ff9999",fontSize:13}}>
              ⚠ {error} <span onClick={()=>setError("")} style={{float:"right",cursor:"pointer"}}>✕</span>
            </div>
          )}

          {/* ── UPLOAD ── */}
          {step==="upload"&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:60}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:700,marginBottom:8,color:P.accentLight}}>Import Production Tracking Sheet</div>
              <p style={{color:P.muted,marginBottom:40,fontSize:14}}>Upload in .xlsx format</p>
              <div
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={handleDrop}
                onClick={()=>fileRef.current.click()}
                style={{border:`2px dashed ${dragOver?P.accent:P.border}`,borderRadius:12,width:480,height:220,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:dragOver?"rgba(232,160,32,0.05)":P.card,transition:"all 0.2s",gap:12}}
              >
                <div style={{fontSize:48}}>📂</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,color:dragOver?P.accentLight:P.text}}>Drop your Excel file here</div>
                <div style={{fontSize:12,color:P.muted}}>or click to browse — .xlsx / .xlsm</div>
              </div>
              <input ref={fileRef} type="file" accept=".xlsx,.xlsm" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
              {/* Session load on upload screen */}
              <div style={{marginTop:16,display:"flex",gap:8,justifyContent:"center"}}>
                <Btn label="📂 Load Previous Session" bg="transparent" border={P.border} tc={P.accentLight} onClick={()=>sessionRef.current.click()}/>
              </div>
            </div>
          )}

          {/* ── REVIEW ── */}
          {step==="review"&&data&&(()=>{
            const sortedPanels = [...data.panels].sort((a,b)=>a.deliverySequence-b.deliverySequence);
            const allIds = sortedPanels.map(p=>p.productId);
            const anyTopLifters = Object.values(sideLifters).some(Boolean);
            // IDs of panels eligible for top lifters (side lifters on)
            const tlEligibleIds = sortedPanels.filter(p=>!!sideLifters[p.productId]).map(p=>p.productId);

            // ── Side Lifters selection ──
            const allSelected  = allIds.length > 0 && allIds.every(id => selectedPanels.has(id));
            const someSelected = selectedPanels.size > 0;
            const toggleSelectAll = () => {
              if (allSelected) setSelectedPanels(new Set());
              else setSelectedPanels(new Set(allIds));
            };
            const toggleSelect = (id) => {
              setSelectedPanels(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
            };
            const applyBulkSideLifters = (val) => {
              setSideLifters(sl => { const n={...sl}; selectedPanels.forEach(id=>{n[id]=val;}); return n; });
              setSelectedPanels(new Set());
            };

            // ── Top Lifters selection (only among TL-eligible panels) ──
            const allTLSelected  = tlEligibleIds.length > 0 && tlEligibleIds.every(id => selectedTLPanels.has(id));
            const someTLSelected = selectedTLPanels.size > 0;
            const toggleSelectAllTL = () => {
              if (allTLSelected) setSelectedTLPanels(new Set());
              else setSelectedTLPanels(new Set(tlEligibleIds));
            };
            const toggleSelectTL = (id) => {
              setSelectedTLPanels(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
            };
            const applyBulkTopLifters = (val) => {
              setTopLifters(tl => { const n={...tl}; selectedTLPanels.forEach(id=>{n[id]=val;}); return n; });
              setSelectedTLPanels(new Set());
            };

            return (
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:700,marginBottom:4,color:P.accentLight}}>Panel Data Preview</div>
              <p style={{color:P.muted,marginBottom:16,fontSize:13}}>
                Review all panels imported from the spreadsheet. Toggle <b style={{color:P.text}}>Side Lifters</b> per panel — when checked the panel is transported rotated and its <b style={{color:"#5b8dd9"}}>Height</b> is used for lane length; otherwise its <b style={{color:P.accent}}>Length</b> is used.
                <br/><span style={{color:P.muted}}>Use the checkboxes to select multiple panels and apply bulk actions.</span>
              </p>

              {/* ── Side Lifters bulk toolbar ── */}
              <div style={{
                display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",
                background:someSelected?P.card:P.surface,
                border:`1px solid ${someSelected?P.accent:P.border}`,
                borderRadius:8,padding:"10px 14px",marginBottom:8,
                transition:"all 0.2s",minHeight:46,
              }}>
                {someSelected ? (
                  <>
                    <span style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:0.8}}>Side Lifters</span>
                    <div style={{width:1,height:20,background:P.border}}/>
                    <span style={{fontSize:12,fontWeight:700,color:P.accentLight,fontFamily:"'IBM Plex Mono'"}}>
                      {selectedPanels.size} panel{selectedPanels.size!==1?"s":""} selected
                    </span>
                    <div style={{width:1,height:20,background:P.border}}/>
                    <button onClick={()=>applyBulkSideLifters(true)}
                      style={{background:"rgba(91,141,217,0.2)",border:"1px solid #5b8dd9",borderRadius:5,padding:"4px 12px",color:"#5b8dd9",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:0.5}}>
                      ✓ Enable All
                    </button>
                    <button onClick={()=>applyBulkSideLifters(false)}
                      style={{background:"rgba(224,82,82,0.1)",border:`1px solid ${P.danger}`,borderRadius:5,padding:"4px 12px",color:P.danger,fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:0.5}}>
                      ✕ Disable All
                    </button>
                    <button onClick={()=>setSelectedPanels(new Set())}
                      style={{marginLeft:"auto",background:"transparent",border:"none",color:P.muted,fontSize:11,cursor:"pointer",padding:"2px 6px"}}>
                      Clear ✕
                    </button>
                  </>
                ) : (
                  <span style={{fontSize:11,color:P.muted}}>
                    ☑ <b style={{color:P.text}}>Side Lifters</b> — select panels to bulk enable / disable.
                  </span>
                )}
              </div>

              {/* ── Top Lifters Facing bulk toolbar (only when any SL active) ── */}
              {anyTopLifters && (
                <div style={{
                  display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",
                  background:someTLSelected?P.card:P.surface,
                  border:`1px solid ${someTLSelected?"#b07fea":P.border}`,
                  borderRadius:8,padding:"10px 14px",marginBottom:12,
                  transition:"all 0.2s",minHeight:46,
                }}>
                  {someTLSelected ? (
                    <>
                      <span style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:0.8}}>Top Lifters Facing</span>
                      <div style={{width:1,height:20,background:P.border}}/>
                      <span style={{fontSize:12,fontWeight:700,color:"#b07fea",fontFamily:"'IBM Plex Mono'"}}>
                        {selectedTLPanels.size} panel{selectedTLPanels.size!==1?"s":""} selected
                      </span>
                      <div style={{width:1,height:20,background:P.border}}/>
                      <button onClick={()=>applyBulkTopLifters("Front of Truck")}
                        style={{background:"rgba(176,127,234,0.15)",border:"1px solid #b07fea",borderRadius:5,padding:"4px 12px",color:"#b07fea",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:0.5}}>
                        ← Front of Truck
                      </button>
                      <button onClick={()=>applyBulkTopLifters("Back of Truck")}
                        style={{background:"rgba(176,127,234,0.15)",border:"1px solid #b07fea",borderRadius:5,padding:"4px 12px",color:"#b07fea",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:0.5}}>
                        Back of Truck →
                      </button>
                      <button onClick={()=>setSelectedTLPanels(new Set())}
                        style={{marginLeft:"auto",background:"transparent",border:"none",color:P.muted,fontSize:11,cursor:"pointer",padding:"2px 6px"}}>
                        Clear ✕
                      </button>
                    </>
                  ) : (
                    <span style={{fontSize:11,color:P.muted}}>
                      ☑ <b style={{color:P.text}}>Top Lifters Facing</b> — select side-lifter panels to bulk set facing direction.
                    </span>
                  )}
                </div>
              )}

              <div style={{overflowX:"auto",marginBottom:20}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:P.surface,position:"sticky",top:0}}>
                      {/* Side Lifters select-all */}
                      <th style={{padding:"9px 10px",borderBottom:`2px solid ${P.border}`,textAlign:"center",width:36}}>
                        <input type="checkbox"
                          checked={allSelected}
                          ref={el=>{ if(el) el.indeterminate = someSelected && !allSelected; }}
                          onChange={toggleSelectAll}
                          style={{width:14,height:14,accentColor:P.accent,cursor:"pointer"}}/>
                      </th>
                      {["Del. Seq","Panel ID","Level","Length (mm)","Height (mm)","Mass (T)","Lane Dim Used","Side Lifters"].map(h=>(
                        <th key={h} style={{padding:"9px 12px",borderBottom:`2px solid ${P.border}`,textAlign:"center",color:P.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,fontSize:10,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                      {/* Top Lifters Facing column header with its own select-all */}
                      {anyTopLifters && (
                        <th style={{padding:"9px 10px",borderBottom:`2px solid ${P.border}`,textAlign:"center",whiteSpace:"nowrap"}}>
                          <div style={{display:"inline-flex",alignItems:"center",gap:6}}>
                            <input type="checkbox"
                              checked={allTLSelected}
                              ref={el=>{ if(el) el.indeterminate = someTLSelected && !allTLSelected; }}
                              onChange={toggleSelectAllTL}
                              style={{width:14,height:14,accentColor:"#b07fea",cursor:"pointer"}}/>
                            <span style={{color:"#b07fea",fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,fontSize:10}}>Top Lifters Facing?</span>
                          </div>
                        </th>
                      )}
                    </tr>
                  </thead>
                  <tbody>
                    {sortedPanels.map((panel,i)=>{
                      const hasSL      = !!sideLifters[panel.productId];
                      const dimUsed    = hasSL ? panel.height : panel.length;
                      const isSelected   = selectedPanels.has(panel.productId);
                      const isTLSelected = selectedTLPanels.has(panel.productId);
                      // Row highlight: TL selection takes purple, SL takes amber, normal alternates
                      const rowBg = isTLSelected ? "rgba(176,127,234,0.07)"
                                  : isSelected   ? "rgba(232,160,32,0.07)"
                                  : i%2===0      ? "transparent"
                                  : "rgba(255,255,255,0.025)";
                      const rowOutline = isTLSelected ? `1px solid #b07fea44`
                                       : isSelected   ? `1px solid ${P.accent}44`
                                       : "none";
                      return (
                        <tr key={panel.productId} style={{background:rowBg,borderBottom:`1px solid ${P.border}22`,outline:rowOutline,transition:"background 0.1s"}}>
                          {/* Side Lifters row checkbox */}
                          <td style={{padding:"7px 10px",textAlign:"center"}}>
                            <input type="checkbox"
                              checked={isSelected}
                              onChange={()=>toggleSelect(panel.productId)}
                              style={{width:14,height:14,accentColor:P.accent,cursor:"pointer"}}/>
                          </td>
                          <td style={{padding:"7px 12px",textAlign:"center",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{panel.deliverySequence}</td>
                          <td style={{padding:"7px 12px",textAlign:"center",fontWeight:700,color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.productId}</td>
                          <td style={{padding:"7px 12px",textAlign:"center",color:P.muted}}>{panel.level||"—"}</td>
                          {/* Length cell */}
                          <td style={{padding:"7px 12px",textAlign:"center",fontFamily:"'IBM Plex Mono'",fontWeight:hasSL?400:700,
                            background:hasSL?"transparent":"rgba(232,160,32,0.15)",
                            color:hasSL?P.muted:P.accentLight,
                            borderLeft:hasSL?"none":`2px solid ${P.accent}66`}}>
                            {panel.length}
                          </td>
                          {/* Height cell */}
                          <td style={{padding:"7px 12px",textAlign:"center",fontFamily:"'IBM Plex Mono'",fontWeight:hasSL?700:400,
                            background:hasSL?"rgba(91,141,217,0.15)":"transparent",
                            color:hasSL?"#5b8dd9":P.muted,
                            borderLeft:hasSL?`2px solid #5b8dd966`:"none"}}>
                            {panel.height}
                          </td>
                          <td style={{padding:"7px 12px",textAlign:"center",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{panel.mass.toFixed(1)}</td>
                          {/* Active dim badge */}
                          <td style={{padding:"7px 12px",textAlign:"center"}}>
                            <span style={{background:hasSL?"rgba(91,141,217,0.2)":"rgba(232,160,32,0.2)",color:hasSL?"#5b8dd9":P.accentLight,borderRadius:4,padding:"2px 8px",fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>
                              {dimUsed} mm
                            </span>
                          </td>
                          {/* Side lifters checkbox */}
                          <td style={{padding:"7px 12px",textAlign:"center"}}>
                            <label style={{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                              <input
                                type="checkbox"
                                checked={hasSL}
                                onChange={e=>setSideLifters(sl=>({...sl,[panel.productId]:e.target.checked}))}
                                style={{width:15,height:15,accentColor:"#5b8dd9",cursor:"pointer"}}
                              />
                              <span style={{fontSize:11,color:hasSL?"#5b8dd9":P.muted}}>{hasSL?"On":"Off"}</span>
                            </label>
                          </td>
                          {/* Top Lifters Facing — with its own row checkbox */}
                          {anyTopLifters && (
                            <td style={{padding:"7px 10px",textAlign:"center"}}>
                              {hasSL ? (
                                <div style={{display:"inline-flex",alignItems:"center",gap:6}}>
                                  <input type="checkbox"
                                    checked={isTLSelected}
                                    onChange={()=>toggleSelectTL(panel.productId)}
                                    style={{width:14,height:14,accentColor:"#b07fea",cursor:"pointer"}}/>
                                  <select
                                    value={topLifters[panel.productId]||"Front of Truck"}
                                    onChange={e=>setTopLifters(tl=>({...tl,[panel.productId]:e.target.value}))}
                                    style={{background:P.surface,border:`1px solid ${isTLSelected?"#b07fea":P.border}`,borderRadius:4,padding:"3px 6px",color:isTLSelected?"#b07fea":P.text,fontSize:11,outline:"none",cursor:"pointer"}}>
                                    <option>Front of Truck</option>
                                    <option>Back of Truck</option>
                                  </select>
                                </div>
                              ) : (
                                <span style={{fontSize:11,color:P.border}}>—</span>
                              )}
                            </td>
                          )}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {/* Summary */}
              <div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
                <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 16px",fontSize:12}}>
                  <span style={{color:P.muted}}>Total panels: </span>
                  <span style={{color:P.accentLight,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{data.panels.length}</span>
                </div>
                <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 16px",fontSize:12}}>
                  <span style={{color:P.muted}}>Using Height (side lifters): </span>
                  <span style={{color:"#5b8dd9",fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{Object.values(sideLifters).filter(Boolean).length}</span>
                </div>
                <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 16px",fontSize:12}}>
                  <span style={{color:P.muted}}>Using Length (standard): </span>
                  <span style={{color:P.accentLight,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{data.panels.length - Object.values(sideLifters).filter(Boolean).length}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:12}}>
                <Btn label="← Back to Config" bg="transparent" border={P.border} tc={P.muted} onClick={()=>setStep("config")}/>
                <Btn label="GENERATE LOADS →" bg={P.accent} tc="#000" onClick={handleGenerate}/>
              </div>
            </div>
            );
          })()}

          {/* ── CONFIG ── */}
          {step==="config"&&data&&(
            <div style={{maxWidth:640,margin:"0 auto"}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:700,marginBottom:4,color:P.accentLight}}>Project Settings</div>
              <p style={{color:P.muted,marginBottom:24,fontSize:13}}>Review auto-detected settings and add delivery details.</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
                <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"12px 16px"}}>
                  <div style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:1}}>Total Panels</div>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:20,fontWeight:500,color:P.accentLight,marginTop:2}}>{data.panels.length}</div>
                </div>
                <div style={{background:P.card,border:`1px solid ${approvalState==="unlocked"?P.accent:P.border}`,borderRadius:8,padding:"12px 16px"}}>
                  <div style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Max Weight per Truck (T)</div>
                  {approvalState === "unlocked" ? (
                    <input
                      type="number" min="1" max="100" step="0.5"
                      value={config.maxWeight}
                      onChange={e=>handleMaxWeightChange(e.target.value)}
                      onBlur={handleMaxWeightBlur}
                      autoFocus
                      style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${P.accent}`,outline:"none",fontFamily:"'IBM Plex Mono',monospace",fontSize:20,fontWeight:500,color:P.accent,padding:"2px 0"}}/>
                  ) : (
                    <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:20,fontWeight:500,color:P.accentLight}}>{config.maxWeight} T</div>
                  )}
                  {approvalState === "locked" && (
                    <button onClick={handleRequestChange}
                      style={{marginTop:8,fontSize:10,padding:"3px 10px",background:"transparent",border:`1px solid ${P.border}`,borderRadius:4,color:P.muted,cursor:"pointer",letterSpacing:0.5}}>
                      🔒 Request Change
                    </button>
                  )}
                  {approvalState === "requested" && (
                    <div style={{marginTop:8}}>
                      <div style={{fontSize:10,color:P.muted,marginBottom:4}}>Show this code to your manager:</div>
                      <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:16,fontWeight:700,color:P.accentLight,letterSpacing:3,marginBottom:6}}>{requestCode}</div>
                      <div style={{fontSize:10,color:P.muted,marginBottom:4}}>Then enter the unlock code:</div>
                      <div style={{display:"flex",gap:6}}>
                        <input
                          type="text" placeholder="UNLOCK CODE" maxLength={8}
                          value={unlockInput}
                          onChange={e=>setUnlockInput(e.target.value.toUpperCase())}
                          style={{flex:1,background:P.surface,border:`1px solid ${P.border}`,borderRadius:4,padding:"4px 8px",color:P.text,fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2}}/>
                        <button onClick={handleUnlockSubmit}
                          style={{padding:"4px 10px",background:P.accent,border:"none",borderRadius:4,color:"#000",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                          Unlock
                        </button>
                      </div>
                      {unlockError && <div style={{fontSize:10,color:P.danger,marginTop:4}}>{unlockError}</div>}
                    </div>
                  )}
                </div>
              </div>
              {/* Truck type selector */}
              <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:16,marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4,color:P.text}}>Truck Type</div>
                <div style={{fontSize:12,color:P.muted,marginBottom:12}}>Sets the maximum lane length for load planning.</div>
                <div style={{display:"flex",gap:10}}>
                  {TRUCK_TYPES.map(tt=>{
                    const sel = config.truckTypeId===tt.id;
                    return (
                      <div key={tt.id} onClick={()=>setConfig(cfg=>({...cfg,truckTypeId:tt.id}))}
                        style={{flex:1,background:sel?P.highlight:P.surface,border:`2px solid ${sel?P.accent:P.border}`,borderRadius:8,padding:"12px 14px",cursor:"pointer",transition:"all 0.15s"}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:sel?P.accentLight:P.text,marginBottom:4}}>{tt.label}</div>
                        <div style={{fontSize:11,color:sel?P.muted:P.muted}}>
                          <span style={{color:sel?P.accentLight:P.muted,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{tt.maxLength.toLocaleString()} mm</span>
                          <span style={{color:P.muted}}> max length</span>
                        </div>
                        <div style={{fontSize:11,marginTop:2}}>
                          <span style={{color:sel?P.accentLight:P.muted,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{tt.maxHeight.toLocaleString()} mm</span>
                          <span style={{color:P.muted}}> max height</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:16,marginBottom:24}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:P.text}}>Project & Delivery Details</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[{key:"projectName",label:"Project Name"},{key:"siteContact",label:"Site Contact"},{key:"projectAddress",label:"Site Address"}].map(({key,label})=>(
                    <label key={key}>
                      <div style={{fontSize:11,color:P.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                      <input value={config[key]} onChange={e=>setConfig(c=>({...c,[key]:e.target.value}))}
                        style={{width:"100%",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"8px 12px",color:P.text,fontSize:13,outline:"none"}}/>
                    </label>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:12}}>
                <Btn label="← Back to Upload" bg="transparent" border={P.border} tc={P.muted} onClick={()=>setStep("upload")}/>
                <Btn label="Next: Preview Data →" bg={P.accent}  tc="#000"         onClick={()=>setStep("review")}/>
              </div>
            </div>
          )}

          {/* ── RESULTS ── */}
          {step==="results"&&loads.length>0&&(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:P.accentLight}}>{config.projectName} — {loads.length} Loads</div>
                  <div style={{fontSize:12,color:P.muted,marginTop:2}}>{truck.label} &nbsp;·&nbsp; Max {truck.maxLength.toLocaleString()} mm per lane &nbsp;·&nbsp; Max height {truck.maxHeight.toLocaleString()} mm</div>
                </div>
                <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                  <Btn label={busy==="dispatch"?"⏳ Generating…":"⬇ Dispatch Sheet PDF"} bg={P.highlight} border="#2a5f9e" tc={P.text} onClick={dlDispatch} disabled={!!busy}/>
                  <Btn label="📋 Dispatch Preview" bg={showDispatchPreview?P.accent:"transparent"} border={showDispatchPreview?P.accent:P.border} tc={showDispatchPreview?"#000":P.accentLight} onClick={()=>setShowDispatchPreview(p=>!p)}/>
                  <Btn label={busy==="all"?"⏳ Generating…":"⬇ All Dockets PDF"}         bg={P.accent}                           tc="#000"   onClick={dlAll}      disabled={!!busy}/>
                  <Btn label="✉ Email Documents" bg="transparent" border="#4caf7d" tc="#4caf7d" onClick={openEmailModal} disabled={!!busy}/>
                  <Btn label="← Back to Review" bg="transparent" border={P.border} tc={P.muted} onClick={()=>setStep("review")}/>
                  <Btn label="💾 Save Session" bg="transparent" border={P.border} tc={P.accentLight} onClick={saveSession}/>
                  <Btn label="📂 Load Session" bg="transparent" border={P.border} tc={P.accentLight} onClick={()=>sessionRef.current.click()}/>
