function getPdfLib() {

  return new Promise((resolve, reject) => {

    script.onerror = () => reject(new Error("Failed to load pdf-lib"));
    document.head.appendChild(script);

}

// ─── PDF drawing helpers ──────────────────────────────────────────────────────

function hexRgb(hex, PDFLib) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return PDFLib.rgb(r, g, b);
}

// Draw the RMK logo block
function drawLogo(page, PDFLib, fonts, x, y, w, h) {
  const { rgb } = PDFLib;
  page.drawRectangle({ x, y: y-h, width: w, height: h, color: rgb(0.086,0.216,0.369) });
  page.drawText("RP",          { x: x+8,  y: y-h+h*0.42, size: Math.round(h*0.44), font: fonts.bold,    color: rgb(1,1,1) });
  page.drawText("RMK PRECAST", { x: x+4,  y: y-h+h*0.18, size: Math.round(h*0.13), font: fonts.bold,    color: rgb(1,1,1) });
  page.drawRectangle({ x, y: y-h, width: w, height: h*0.09, color: rgb(0.91,0.41,0.02) });
}

// Draw a labelled form field (label text above, outlined box below)
function drawField(page, PDFLib, fonts, label, value, x, y, w, h=16) {
  const { rgb } = PDFLib;
  page.drawText(label, { x, y: y+1, size: 7, font: fonts.bold, color: rgb(0,0,0) });
  page.drawRectangle({ x, y: y-h, width: w, height: h, borderColor: rgb(0.5,0.5,0.5), borderWidth: 0.5, color: rgb(1,1,1) });
  if (value != null && String(value).length > 0) {
    page.drawText(String(value), { x: x+3, y: y-h+4, size: 8, font: fonts.regular, color: rgb(0,0,0) });
  }
}

// Draw a single table row given an array of {x, w, text} col specs
function drawRow(page, PDFLib, fonts, cols, y, rh, style) {
  const { rgb } = PDFLib;
  const fills = {
    header:    rgb(0,0,0),
    subheader: hexRgb("#DCE6F1", PDFLib),
    total:     hexRgb("#E8E8E8", PDFLib),
    alt:       rgb(0.96,0.96,0.96),
    normal:    rgb(1,1,1),
  };
  const fill   = fills[style] || fills.normal;
  const tc     = style === "header" ? rgb(1,1,1) : rgb(0,0,0);
  const fnt    = (style === "header" || style === "total" || style === "subheader") ? fonts.bold : fonts.regular;
  const fs     = style === "header" ? 7 : 8;

  for (const col of cols) {
    page.drawRectangle({ x: col.x, y: y-rh, width: col.w, height: rh,
      color: fill, borderColor: rgb(0.6,0.6,0.6), borderWidth: 0.4 });
    const txt = col.text != null ? String(col.text) : "";
    if (txt) {
      const maxC = Math.floor((col.w - 4) / (fs * 0.58));
      const disp = txt.length > maxC ? txt.slice(0, maxC-1)+"…" : txt;
      page.drawText(disp, { x: col.x+2, y: y-rh+3, size: fs, font: fnt, color: tc });
    }
  }
}

// Word-wrap and draw a paragraph; returns final y
function drawWrapped(page, PDFLib, fonts, text, x, y, maxW, size, color) {
  const { rgb } = PDFLib;
  const words = text.split(" ");
  let line = "";
  const lh = size + 2;
  for (const w of words) {
    const test = line ? line+" "+w : w;
    if (fonts.regular.widthOfTextAtSize(test, size) > maxW) {
      page.drawText(line, { x, y, size, font: fonts.regular, color });
      y -= lh; line = w;
    } else { line = test; }
  }
  if (line) { page.drawText(line, { x, y, size, font: fonts.regular, color }); y -= lh; }
  return y;
}

async function generateDocketPDF(load, projectName, projectAddress, siteContact, truckLabel, loadDate, delivDate, carrier) {
  const fmtDate = d => d || "";
  const PDFLib = await getPdfLib();
  const { PDFDocument, rgb, StandardFonts } = PDFLib;

    const logoBytes = Uint8Array.from(atob(RMK_LOGO_B64), ch => ch.charCodeAt(0));

  } catch(e) {

  }

  // Docket number box (top-right)

  page.drawRectangle({ x: dnX, y: y-dnH, width: dnW, height: dnH,

  page.drawLine({ start:{x: dnX+88, y: y-dnH}, end:{x: dnX+88, y}, thickness:1, color: rgb(0,0,0) });

  page.drawText(docketNum, { x: dnX+92, y: y-13, size: 8, font: regular, color: rgb(0,0,0) });

  // Title
  y -= 60;
  const title = "Load Docket";
  const tw = bold.widthOfTextAtSize(title, 18);
  page.drawText(title, { x: (width-tw)/2, y, size: 18, font: bold, color: rgb(0,0,0) });
  y -= 22;

  // Header fields — 3 columns
  const fc = cw/3, fh = 17, fg = 3;
  const row = (fields, rowY) => {
    fields.forEach(([lbl, val, rx, rw]) => drawField(page, PDFLib, fonts, lbl, val, rx, rowY, rw, fh));
  };
  row([["Project", projectName, M, fc-fg], ["Trailer Type", truckLabel||"", M+fc, fc-fg], ["Carrier", carrier||"", M+fc*2, fc]], y);
  y -= fh+8;
  row([["Load Date", fmtDate(loadDate), M, fc-fg], ["Load Number", load.number, M+fc, fc-fg], ["Site Contact", siteContact, M+fc*2, fc]], y);
  y -= fh+8;
  row([["Delivery Date", fmtDate(delivDate), M, fc-fg], ["On site Time", "", M+fc, fc-fg], ["Site Address", projectAddress, M+fc*2, fc]], y);
  y -= fh+8;

  // Arrival / Departure row (highlighted)
  drawField(page, PDFLib, fonts, "Actual Arrival Time", "", M, y, fc*1.5-fg, fh);
  page.drawRectangle({ x: M+fc*1.5, y: y-fh, width: fc*1.5, height: fh,
    color: hexRgb("#BDD7EE", PDFLib), borderColor: rgb(0.4,0.4,0.4), borderWidth:0.5 });
  page.drawText("Departure Time RMK", { x: M+fc*1.5+3, y: y-fh+5, size: 8, font: bold, color: rgb(0,0,0) });
  y -= fh+12;

  // Panel table
  const rh = 14;
  const TC = [
    { key:"panel",    label:"Panel\nNumber",     w: cw*0.21 },
    { key:"length",   label:"Q/A\nLength(mm)",   w: cw*0.15 },
    { key:"height",   label:"Q/A\nHeight(mm)",   w: cw*0.15 },
    { key:"mass",     label:"Mass(t)",            w: cw*0.12 },
    { key:"unload",   label:"Unload\nSequence",   w: cw*0.15 },
    { key:"comments", label:"COMMENTS",           w: cw*0.22 },
  ];
  let cx = M;
  TC.forEach(c => { c.x = cx; cx += c.w; });

  // Draw header (handle two-line labels)
  for (const col of TC) {
    page.drawRectangle({ x: col.x, y: y-rh, width: col.w, height: rh,
      color: rgb(0,0,0), borderColor: rgb(0.4,0.4,0.4), borderWidth:0.4 });
    const lines = col.label.split("\n");
    if (lines.length === 2) {
      page.drawText(lines[0], { x: col.x+2, y: y-rh+8, size: 6.5, font: bold, color: rgb(1,1,1) });
      page.drawText(lines[1], { x: col.x+2, y: y-rh+2, size: 6.5, font: bold, color: rgb(1,1,1) });
    } else {
      page.drawText(col.label, { x: col.x+2, y: y-rh+4, size: 6.5, font: bold, color: rgb(1,1,1) });
    }
  }
  y -= rh;

  let totalW = 0;
  for (let li = 0; li < 2; li++) {
    const lp = load.lanes[li];

    const lbl = li === 0 ? "A" : "B";

    // Lane sub-header
    drawRow(page, PDFLib, fonts,
      [{ x: M, w: cw, text: `  Lane ${lbl}  —  ${load.laneLength[li]} mm  /  ${lp.length} panel${lp.length!==1?"s":""}` }],

              : c.key==="height"   ? p.height
              : c.key==="mass"     ? p.mass.toFixed(1)
              : c.key==="unload"   ? i+1
              : "",
        })), y, rh, style);
      y -= rh;
      totalW += p.mass;
    });

  // Total row
  drawRow(page, PDFLib, fonts,
    TC.map((c,i) => ({ ...c, text: i===2?"TOTAL": i===3?totalW.toFixed(1):"" })),
    y, rh, "total");
  y -= rh + 14;

  // Disclaimer
  const discH = 42;
  page.drawRectangle({ x: M, y: y-discH, width: cw, height: discH,
    borderColor: rgb(0.6,0.6,0.6), borderWidth:0.5, color: rgb(1,1,1) });
  drawWrapped(page, PDFLib, fonts,
    "I Hereby declare that I have confirmed the height and mass of the load. I have visibly checked all lashing and restraint for compliance with local road authority. Any damage caused during transit will be reported to RMK PRECAST. I acknowledge that this docket is evidence of the time and locations of my delivery and is to be true to all information recorded.",
    M+5, y-8, cw-10, 7, rgb(0.25,0.25,0.25));
  y -= discH + 14;

  // Fine print note
  page.drawText(
    "Copy of this docket is to be signed by the recipient on site. I acknowledge that without this signature the docket may be invalid.",
    { x: M, y, size: 6.5, font: regular, color: rgb(0.4,0.4,0.4) });
  y -= 10;

  // Signature fields (2 rows × 2 cols)
  const sigH = 32, hw = cw/2 - 4;
  for (const [l1, l2] of [["Driver Name","Driver Signature"],["Delivery Recipient Name","Recipient Signature"]]) {
    drawField(page, PDFLib, fonts, l1, "", M,        y, hw,   sigH);
    drawField(page, PDFLib, fonts, l2, "", M+hw+8,   y, hw,   sigH);
    y -= sigH + 10;
  }

  return await doc.save();
}

    { label:"Height (mm)",    w: cw*0.078 },
    { label:"Mass (T)",       w: cw*0.066 },
    { label:"Del. Seq",       w: cw*0.055 },
    { label:"Load No.",       w: cw*0.055 },
    { label:"Lane",           w: cw*0.044 },
    { label:"Time at Yard",   w: cw*0.090 },
    { label:"Time On Site",   w: cw*0.090 },
    { label:"Delivery Date",  w: cw*0.090 },
    { label:"Trailer Type",   w: cw*0.090 },
    { label:"Comment",        w: cw*0.176 },
  ];
  let colX = M;
  TC.forEach(col => { col.x = colX; colX += col.w; });

  // Header row
  page.drawRectangle({ x: M, y: y - ROW_H, width: cw, height: ROW_H, color: rgb(0,0,0) });
  TC.forEach(col => {
    page.drawLine({ start:{x:col.x, y:y}, end:{x:col.x, y:y-ROW_H}, thickness:0.3, color: rgb(0.3,0.3,0.3) });
    page.drawText(col.label, { x: col.x+3, y: y-ROW_H+4, size: 6.2, font: bold, color: rgb(1,1,1) });
  });
  y -= ROW_H;

  // Data rows
  const allPanels = loads
    .flatMap(l => l.lanes.flatMap((lane, li) =>
      lane.map(p => ({ ...p, loadNumber: l.number, lane: li===0?"A":"B" }))

  let prevLoad = null;
  allPanels.forEach((p, i) => {
    if (y - ROW_H < BOTTOM_LIMIT) return;
    const newLoad = p.loadNumber !== prevLoad;

    // Alternating row background
    const rowBg = i%2===0 ? LGRAY : rgb(1,1,1);
    page.drawRectangle({ x: M, y: y-ROW_H, width: cw, height: ROW_H, color: rowBg });

    // Load No cell highlight on new load
    if (newLoad) {
      page.drawRectangle({ x: TC[5].x, y: y-ROW_H, width: TC[5].w, height: ROW_H, color: HBLUE });
    }

    // Cell borders
    TC.forEach(col => {
      page.drawRectangle({ x: col.x, y: y-ROW_H, width: col.w, height: ROW_H,
        borderColor: MGRAY, borderWidth: 0.25 });
    });

    // Load group separator drawn LAST so row background does not paint over it
    if (newLoad && i > 0) {
      page.drawLine({ start:{x:M, y:y}, end:{x:M+cw, y:y}, thickness:1.2, color: rgb(0,0,0) });
    }

    // Cell text
    const vals = [
      p.productId, String(p.length), String(p.height), p.mass.toFixed(1),
      String(p.deliverySequence), newLoad ? String(p.loadNumber) : "", p.lane,
      "","","",(newLoad&&loadTruckLabels&&loadTruckLabels[p.loadNumber])||"",
      (newLoad&&loadOverflow&&loadOverflow[p.loadNumber]) ? "Review Truck Type!" : "",
    ];
    TC.forEach((col, ci) => {
      const txt = vals[ci];
      if (!txt) return;
      const isBoldCell = ci === 0 || (ci === 5 && newLoad);
      const cellColor  = ci === 0 ? rgb(0,0,0)
                       : ci === 6 ? ORANGE
                       : (ci === 5 && newLoad) ? rgb(0,0,0)
                       : (ci === 11 && txt.startsWith("Review Truck")) ? hexRgb("#C00000", PDFLib)
                       : DTEXT;
      const maxC = Math.floor((col.w - 5) / (7 * 0.58));
      const disp = txt.length > maxC ? txt.slice(0, maxC-1)+"…" : txt;
      page.drawText(disp, { x: col.x+3, y: y-ROW_H+4, size: 7,
        font: isBoldCell ? bold : regular, color: cellColor });
    });

    prevLoad = p.loadNumber;
    y -= ROW_H;
  });

  // ── Footer totals bar ──
  page.drawRectangle({ x: M, y: M, width: cw, height: FOOTER_H, color: rgb(0,0,0) });
  const totalW = loads.reduce((s,l) => s + l.totalWeight, 0);
  const summaryItems = [
    { label:"TOTAL PANELS",  val: String(allPanels.length) },
    { label:"TOTAL LOADS",   val: String(loads.length) },
    { label:"TOTAL WEIGHT",  val: totalW.toFixed(1) + " T" },
  ];
  const colW3 = cw / summaryItems.length;
  summaryItems.forEach((item, i) => {
    const cx = M + i * colW3 + colW3 / 2;
    const lw = regular.widthOfTextAtSize(item.label, 6.5);
    const vw = bold.widthOfTextAtSize(item.val, 11);
    page.drawText(item.label, { x: cx - lw/2, y: M + FOOTER_H - 10, size: 6.5, font: regular, color: rgb(1,1,1) });
    page.drawText(item.val,   { x: cx - vw/2, y: M + 4,              size: 11,  font: bold,    color: rgb(1,1,1) });
    if (i < summaryItems.length - 1) {
      page.drawLine({
        start: { x: M + colW3*(i+1), y: M+3 },
        end:   { x: M + colW3*(i+1), y: M+FOOTER_H-3 },
        thickness: 0.5, color: rgb(0.3,0.3,0.3),
      });
    }
  });



  return await doc.save();
}
// ─── Download helper ──────────────────────────────────────────────────────────

function downloadPDF(bytes, filename) {
  const blob = new Blob([bytes], { type: "application/pdf" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// ─── Load assignment: 2-lane bin-packing ─────────────────────────────────────

function assignLoads(panels, maxWeight, maxLength, laneLen) {
  const sorted = [...panels].sort((a,b) => a.deliverySequence - b.deliverySequence);
  const loads  = [];
  const newLoad = n => ({ number:n, lanes:[[],[]], laneLength:[0,0], totalWeight:0, panels:[] });
  let cur = newLoad(1);
  // laneLen: function that returns the dimension used for lane accumulation per panel
  // default = p.length; if side lifters → p.height (panel transported rotated)
  const pLen = laneLen || (p => (p.length||0));
  const close = () => {
    cur.panels = [...cur.lanes[0],...cur.lanes[1]].sort((a,b)=>a.deliverySequence-b.deliverySequence);
    loads.push(cur);
  };
  for (const panel of sorted) {
    const pl = pLen(panel), pw = panel.mass||0;
    const wOk = cur.totalWeight+pw <= maxWeight;
    const l0  = cur.laneLength[0]+pl <= maxLength;
    const l1  = cur.laneLength[1]+pl <= maxLength;
    if (wOk && (l0||l1)) {
      const t = (l0&&l1) ? (cur.laneLength[0]<=cur.laneLength[1]?0:1) : (l0?0:1);  // pick less-full lane
      cur.lanes[t].push(panel); cur.laneLength[t]+=pl; cur.totalWeight+=pw;
    } else {
      close(); cur=newLoad(loads.length+1);
      cur.lanes[0].push(panel); cur.laneLength[0]+=pl; cur.totalWeight+=pw;
    }
  }
  if (cur.lanes[0].length+cur.lanes[1].length>0) close();
  return loads;
}

// ─── Excel parser ─────────────────────────────────────────────────────────────

function parseExcel(buffer) {
  const wb = XLSX.read(buffer, { type:"array", cellDates:true });
  const gdRows = XLSX.utils.sheet_to_json(wb.Sheets["General Data"], { header:1 });
  let maxWeight=22.5, maxLength=13000, projectName="", projectAddress="";
  let panelTypes=[];
  for (const row of gdRows) {
    if (row[0]==="Project name")       projectName    = row[1]||"";
    if (row[0]==="Project address")    projectAddress = row[1]||"";
    if (row[0]==="Overweight limit (T)") maxWeight = parseFloat(row[1])||22.5;
    if (row[0]==="Maximum length (mm)") maxLength  = parseFloat(row[1])||13000;
    if (typeof row[0]==="number"&&row[1]&&row[2]&&row[3])
      panelTypes.push({type:row[0],maxHeight:row[1],maxLength:row[2],trailerType:row[3]});
  }
  const pdRows = XLSX.utils.sheet_to_json(wb.Sheets["Production Data HUB"], { header:1 });
  const hdrs   = pdRows[0];
  const panels = [];
  for (let i=1;i<pdRows.length;i++) {
    const row = pdRows[i];
    if (!row||row.every(v=>v==null||v==="")) continue;
    const g = n => { const idx=hdrs.indexOf(n); return idx>=0?row[idx]:undefined; };
    const seq = g("Delivery Sequence");
    if (seq==null||seq==="") continue;
    panels.push({
      productId: g("Product ID")||"",
      level:     g("Level")||"",
      length:    parseFloat(g("Length(mm)"))||0,
      height:    parseFloat(g("Height(mm)"))||0,
      mass:      parseFloat(g("Mass (T)"))||0,
      deliverySequence: parseInt(seq),
      sideLiftable: String(g("Side lifters?")||"").toLowerCase() === "yes",
    });
  }
  return { maxWeight, maxLength, projectName, projectAddress, panelTypes, panels };
}

      loadTrucks, loadDates, loadDelivDates, loadCarriers,
    };
    const blob = new Blob([JSON.stringify(session, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = `${config.projectName || "RMK"}_session.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  };

  const loadSession = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const s = JSON.parse(e.target.result);
        if (s.version !== 1) { alert("Unrecognised session file."); return; }
        if (s.step)           setStep(s.step);
        if (s.config)         setConfig(s.config);
        if (s.data)           setData(s.data);
        if (s.loads)          setLoads(s.loads);
        if (s.sideLifters)    setSideLifters(s.sideLifters);
        if (s.loadTrucks)     setLoadTrucks(s.loadTrucks);
        if (s.loadDates)      setLoadDates(s.loadDates);
        if (s.loadDelivDates) setLoadDelivDates(s.loadDelivDates);
        if (s.loadCarriers)   setLoadCarriers(s.loadCarriers);
        if (s.loads && s.loads.length > 0) setActiveLoad(s.loads[0]);
      } catch(err) { alert("Could not read session file: " + err.message); }
    };
    reader.readAsText(file);
  };

  const processFile = useCallback((file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = parseExcel(new Uint8Array(e.target.result));
        if (!parsed.panels.length) { setError("No panels found in 'Production Data HUB'. Check Delivery Sequence is filled."); return; }
        setData(parsed);
        setConfig({ projectName: parsed.projectName||"", siteContact:"", projectAddress: parsed.projectAddress||"", truckTypeId:"flatbed" });
        // Initialise sideLifters from spreadsheet data
        const initSL = {};
        parsed.panels.forEach(p => { initSL[p.productId] = false; });
        setSideLifters(initSL);
        setStep("config"); setError("");
      } catch(err) { setError("Failed to parse: "+err.message); }
    };
    reader.readAsArrayBuffer(file);
  }, []);

  const handleDrop = e => { e.preventDefault(); setDragOver(false); const f=e.dataTransfer.files[0]; if(f) processFile(f); };

  const handleGenerate = () => {
    const truck = TRUCK_TYPES.find(t => t.id === config.truckTypeId) || TRUCK_TYPES[2];
    const getLaneLen = p => sideLifters[p.productId] ? (p.height||0) : (p.length||0);
    const result = assignLoads(data.panels, data.maxWeight, truck.maxLength, getLaneLen);
    const initTrucks = {};
    result.forEach(l => { initTrucks[l.number] = config.truckTypeId; });
    setLoadTrucks(initTrucks);
    setLoads(result); setActiveLoad(result[0]||null); setStep("results");
  };

  const dlDispatch = async () => {
    setBusy("dispatch");
    try {
      const truckLabels = {};
      const overflowMap = {};
      loads.forEach(l => {
        const tid = loadTrucks[l.number] || config.truckTypeId;
        const lt = TRUCK_TYPES.find(t => t.id === tid) || truck;
        truckLabels[l.number] = lt.label;
        overflowMap[l.number] = l.laneLength[0] > lt.maxLength || l.laneLength[1] > lt.maxLength;
      });
      downloadPDF(await generateDispatchPDF(loads, config.projectName, data.maxWeight, (TRUCK_TYPES.find(t=>t.id===config.truckTypeId)||TRUCK_TYPES[2]).maxLength, truckLabels, overflowMap), `${config.projectName}_Dispatch_Sheet.pdf`);
    }
    catch(e) { setError("PDF error: "+e.message); }
    setBusy("");
  };

  const dlDocket = async (load) => {
    setBusy("d"+load.number);
    const loadTruck = TRUCK_TYPES.find(t => t.id === (loadTrucks[load.number] || config.truckTypeId)) || truck;
    try { downloadPDF(await generateDocketPDF(load, config.projectName, config.projectAddress, config.siteContact, loadTruck.label, loadDates[load.number], loadDelivDates[load.number], loadCarriers[load.number]), `${config.projectName}_Docket_${load.number}.pdf`); }
    catch(e) { setError("PDF error: "+e.message); }
    setBusy("");
  };

  const dlAll = async () => {
    setBusy("all");
    try {
      const PDFLib = await getPdfLib();
      const { PDFDocument } = PDFLib;
      const merged = await PDFDocument.create();
      for (const load of loads) {
        const loadTruck = TRUCK_TYPES.find(t => t.id === (loadTrucks[load.number] || config.truckTypeId)) || truck;
        const bytes = await generateDocketPDF(load, config.projectName, config.projectAddress, config.siteContact, loadTruck.label, loadDates[load.number], loadDelivDates[load.number], loadCarriers[load.number]);
        const src   = await PDFDocument.load(bytes);
        const [pg]  = await merged.copyPages(src, [0]);
        merged.addPage(pg);
      }
      downloadPDF(await merged.save(), `${config.projectName}_All_Dockets.pdf`);
    } catch(e) { setError("PDF error: "+e.message); }
    setBusy("");
  };

  const truck = TRUCK_TYPES.find(t => t.id === config.truckTypeId) || TRUCK_TYPES[2];

  return (
    <>
      <style>{globalCss}</style>
      <input ref={sessionRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{loadSession(e.target.files[0]); e.target.value="";}} />
      <div style={{minHeight:"100vh", background:P.bg}}>

        {/* ── Header ── */}
        <div style={{background:P.surface, borderBottom:`2px solid ${P.accent}`, padding:"12px 24px", display:"flex", alignItems:"center", gap:16}}>
          <div style={{width:8, height:36, background:P.accent, borderRadius:2}}/>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:700, letterSpacing:2, color:P.accentLight}}>RMK PRECAST</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:13, color:P.muted, letterSpacing:3, textTransform:"uppercase"}}>Transport Schedule Generator</div>
          </div>
          <div style={{marginLeft:"auto", display:"flex", gap:8}}>
            {["upload","config","review","results"].map((s,i)=>{
              const order = ["upload","config","review","results"];
              const done = order.indexOf(step) > i;
              return (
                <div key={s} style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:step===s?P.accent:done?P.success:P.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:step===s||done?"#000":P.muted}}>
                    {done?"✓":i+1}
                  </div>
                  <span style={{fontSize:11,color:step===s?P.accentLight:P.muted,textTransform:"uppercase",letterSpacing:1}}>{s}</span>
                  {i<3&&<span style={{color:P.border}}>›</span>}
                </div>
              );
            })}
          </div>
        </div>

        <div style={{maxWidth:1100, margin:"0 auto", padding:24}}>
          {error&&(
            <div style={{background:"#3a1a1a",border:`1px solid ${P.danger}`,borderRadius:8,padding:"12px 16px",marginBottom:16,color:"#ff9999",fontSize:13}}>
              ⚠ {error} <span onClick={()=>setError("")} style={{float:"right",cursor:"pointer"}}>✕</span>
            </div>
          )}

          {/* ── UPLOAD ── */}
          {step==="upload"&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:60}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:700,marginBottom:8,color:P.accentLight}}>Import Production Tracking Sheet</div>
              <p style={{color:P.muted,marginBottom:40,fontSize:14}}>Upload in .xlsx format</p>
              <div
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={handleDrop}
                onClick={()=>fileRef.current.click()}
                style={{border:`2px dashed ${dragOver?P.accent:P.border}`,borderRadius:12,width:480,height:220,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:dragOver?"rgba(232,160,32,0.05)":P.card,transition:"all 0.2s",gap:12}}
              >
                <div style={{fontSize:48}}>📂</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,color:dragOver?P.accentLight:P.text}}>Drop your Excel file here</div>
                <div style={{fontSize:12,color:P.muted}}>or click to browse — .xlsx / .xlsm</div>
              </div>
              <input ref={fileRef} type="file" accept=".xlsx,.xlsm" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
              {/* Session load on upload screen */}
              <div style={{marginTop:16,display:"flex",gap:8,justifyContent:"center"}}>
                <Btn label="📂 Load Previous Session" bg="transparent" border={P.border} tc={P.accentLight} onClick={()=>sessionRef.current.click()}/>
              </div>
            </div>
          )}

          {/* ── REVIEW ── */}
          {step==="review"&&data&&(
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:700,marginBottom:4,color:P.accentLight}}>Panel Data Preview</div>
              <p style={{color:P.muted,marginBottom:20,fontSize:13}}>
                Review all panels imported from the spreadsheet. Toggle <b style={{color:P.text}}>Side Lifters</b> per panel — when checked the panel is transported rotated and its <b style={{color:"#5b8dd9"}}>Height</b> is used for lane length; otherwise its <b style={{color:P.accent}}>Length</b> is used.
              </p>
              <div style={{overflowX:"auto",marginBottom:20}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:P.surface,position:"sticky",top:0}}>
                      {["Del. Seq","Panel ID","Level","Length (mm)","Height (mm)","Mass (T)","Lane Dim Used","Side Lifters"].map(h=>(
                        <th key={h} style={{padding:"9px 12px",borderBottom:`2px solid ${P.border}`,textAlign:"center",color:P.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,fontSize:10,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...data.panels].sort((a,b)=>a.deliverySequence-b.deliverySequence).map((panel,i)=>{
                      const hasSL = !!sideLifters[panel.productId];
                      const dimUsed = hasSL ? panel.height : panel.length;
                      return (
                        <tr key={panel.productId} style={{background:i%2===0?"transparent":"rgba(255,255,255,0.025)",borderBottom:`1px solid ${P.border}22`}}>
                          <td style={{padding:"7px 12px",textAlign:"center",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{panel.deliverySequence}</td>
                          <td style={{padding:"7px 12px",textAlign:"center",fontWeight:700,color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.productId}</td>
                          <td style={{padding:"7px 12px",textAlign:"center",color:P.muted}}>{panel.level||"—"}</td>
                          {/* Length cell — highlighted amber when no side lifters */}
                          <td style={{padding:"7px 12px",textAlign:"center",fontFamily:"'IBM Plex Mono'",fontWeight:hasSL?400:700,
                            background:hasSL?"transparent":"rgba(232,160,32,0.15)",
                            color:hasSL?P.muted:P.accentLight,
                            borderLeft:hasSL?"none":`2px solid ${P.accent}66`}}>
                            {panel.length}
                          </td>
                          {/* Height cell — highlighted blue when side lifters on */}
                          <td style={{padding:"7px 12px",textAlign:"center",fontFamily:"'IBM Plex Mono'",fontWeight:hasSL?700:400,
                            background:hasSL?"rgba(91,141,217,0.15)":"transparent",
                            color:hasSL?"#5b8dd9":P.muted,
                            borderLeft:hasSL?`2px solid #5b8dd966`:"none"}}>
                            {panel.height}
                          </td>
                          <td style={{padding:"7px 12px",textAlign:"center",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{panel.mass.toFixed(1)}</td>
                          {/* Active dim badge */}
                          <td style={{padding:"7px 12px",textAlign:"center"}}>
                            <span style={{background:hasSL?"rgba(91,141,217,0.2)":"rgba(232,160,32,0.2)",color:hasSL?"#5b8dd9":P.accentLight,borderRadius:4,padding:"2px 8px",fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>
                              {dimUsed} mm
                            </span>
                          </td>
                          {/* Side lifters checkbox */}
                          <td style={{padding:"7px 12px",textAlign:"center"}}>
                            <label style={{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                              <input
                                type="checkbox"
                                checked={hasSL}
                                onChange={e=>setSideLifters(sl=>({...sl,[panel.productId]:e.target.checked}))}
                                style={{width:15,height:15,accentColor:"#5b8dd9",cursor:"pointer"}}
                              />
                              <span style={{fontSize:11,color:hasSL?"#5b8dd9":P.muted}}>{hasSL?"On":"Off"}</span>
                            </label>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {/* Summary */}
              <div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
                <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 16px",fontSize:12}}>
                  <span style={{color:P.muted}}>Total panels: </span>
                  <span style={{color:P.accentLight,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{data.panels.length}</span>
                </div>
                <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 16px",fontSize:12}}>
                  <span style={{color:P.muted}}>Using Height (side lifters): </span>
                  <span style={{color:"#5b8dd9",fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{Object.values(sideLifters).filter(Boolean).length}</span>
                </div>
                <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 16px",fontSize:12}}>
                  <span style={{color:P.muted}}>Using Length (standard): </span>
                  <span style={{color:P.accentLight,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{data.panels.length - Object.values(sideLifters).filter(Boolean).length}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:12}}>
                <Btn label="← Back to Config" bg="transparent" border={P.border} tc={P.muted} onClick={()=>setStep("config")}/>
                <Btn label="GENERATE LOADS →" bg={P.accent} tc="#000" onClick={handleGenerate}/>
              </div>
            </div>
          )}

          {/* ── CONFIG ── */}
          {step==="config"&&data&&(
            <div style={{maxWidth:640,margin:"0 auto"}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:700,marginBottom:4,color:P.accentLight}}>Project Settings</div>
              <p style={{color:P.muted,marginBottom:24,fontSize:13}}>Review auto-detected settings and add delivery details.</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
                {[{label:"Total Panels",val:data.panels.length},{label:"Max Weight (T)",val:data.maxWeight}].map(({label,val})=>(
                  <div key={label} style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"12px 16px"}}>
                    <div style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                    <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:20,fontWeight:500,color:P.accentLight,marginTop:2}}>{val}</div>
                  </div>
                ))}
              </div>
              {/* Truck type selector */}
              <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:16,marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4,color:P.text}}>Truck Type</div>
                <div style={{fontSize:12,color:P.muted,marginBottom:12}}>Sets the maximum lane length for load planning.</div>
                <div style={{display:"flex",gap:10}}>
                  {TRUCK_TYPES.map(tt=>{
                    const sel = config.truckTypeId===tt.id;
                    return (
                      <div key={tt.id} onClick={()=>setConfig(cfg=>({...cfg,truckTypeId:tt.id}))}
                        style={{flex:1,background:sel?P.highlight:P.surface,border:`2px solid ${sel?P.accent:P.border}`,borderRadius:8,padding:"12px 14px",cursor:"pointer",transition:"all 0.15s"}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:sel?P.accentLight:P.text,marginBottom:4}}>{tt.label}</div>
                        <div style={{fontSize:11,color:sel?P.muted:P.muted}}>
                          <span style={{color:sel?P.accentLight:P.muted,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{tt.maxLength.toLocaleString()} mm</span>
                          <span style={{color:P.muted}}> max length</span>
                        </div>
                        <div style={{fontSize:11,marginTop:2}}>
                          <span style={{color:sel?P.accentLight:P.muted,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{tt.maxHeight.toLocaleString()} mm</span>
                          <span style={{color:P.muted}}> max height</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:16,marginBottom:24}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:P.text}}>Project & Delivery Details</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[{key:"projectName",label:"Project Name"},{key:"siteContact",label:"Site Contact"},{key:"projectAddress",label:"Site Address"}].map(({key,label})=>(
                    <label key={key}>
                      <div style={{fontSize:11,color:P.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                      <input value={config[key]} onChange={e=>setConfig(c=>({...c,[key]:e.target.value}))}
                        style={{width:"100%",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"8px 12px",color:P.text,fontSize:13,outline:"none"}}/>
                    </label>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:12}}>
                <Btn label="← Back to Upload" bg="transparent" border={P.border} tc={P.muted} onClick={()=>setStep("upload")}/>
                <Btn label="Next: Preview Data →" bg={P.accent}  tc="#000"         onClick={()=>setStep("review")}/>
              </div>
            </div>
          )}

          {/* ── RESULTS ── */}
          {step==="results"&&loads.length>0&&(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:P.accentLight}}>{config.projectName} — {loads.length} Loads</div>
                  <div style={{fontSize:12,color:P.muted,marginTop:2}}>{truck.label} &nbsp;·&nbsp; Max {truck.maxLength.toLocaleString()} mm per lane &nbsp;·&nbsp; Max height {truck.maxHeight.toLocaleString()} mm</div>
                </div>
                <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                  <Btn label={busy==="dispatch"?"⏳ Generating…":"⬇ Dispatch Sheet PDF"} bg={P.highlight} border="#2a5f9e" tc={P.text} onClick={dlDispatch} disabled={!!busy}/>
                  <Btn label={busy==="all"?"⏳ Generating…":"⬇ All Dockets PDF"}         bg={P.accent}                           tc="#000"   onClick={dlAll}      disabled={!!busy}/>
                  <Btn label="← Back to Review" bg="transparent" border={P.border} tc={P.muted} onClick={()=>setStep("review")}/>
                  <Btn label="💾 Save Session" bg="transparent" border={P.border} tc={P.accentLight} onClick={saveSession}/>
                  <Btn label="📂 Load Session" bg="transparent" border={P.border} tc={P.accentLight} onClick={()=>sessionRef.current.click()}/>

                  <Btn label="New File" bg="transparent" border={P.border} tc={P.muted} onClick={()=>{setStep("upload");setData(null);setLoads([]);setSideLifters({});setLoadTrucks({});setLoadDates({});setLoadDelivDates({});setLoadCarriers({});}}/>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>

                {/* Load list */}
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {loads.map(load=>{
                    const loadTruckId  = loadTrucks[load.number] || config.truckTypeId;
                    const loadTruckObj = TRUCK_TYPES.find(t => t.id === loadTruckId) || truck;
                    const wPct  = Math.min(100,(load.totalWeight/data.maxWeight)*100);
                    const l0Pct = Math.min(100,(load.laneLength[0]/loadTruckObj.maxLength)*100);
                    const l1Pct = Math.min(100,(load.laneLength[1]/loadTruckObj.maxLength)*100);
                    const laneOverflow = load.laneLength[0] > loadTruckObj.maxLength || load.laneLength[1] > loadTruckObj.maxLength;
                    const active = activeLoad?.number===load.number;
                    return (
                      <div key={load.number}
                        style={{background:active?P.highlight:P.card,border:`1px solid ${laneOverflow?P.danger:active?P.accent:P.border}`,borderRadius:8,padding:"10px 12px",transition:"all 0.15s"}}>
                        <div onClick={()=>setActiveLoad(load)} style={{cursor:"pointer"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:laneOverflow?P.danger:active?P.accentLight:P.text}}>Load {load.number}</span>
                            <span style={{fontSize:11,color:P.muted}}>{load.panels.length} panels</span>
                          </div>
                          {laneOverflow&&(
                            <div style={{marginTop:4,marginBottom:2,fontSize:10,fontWeight:700,color:P.danger,letterSpacing:0.5}}>
                              ⚠ Review Truck Type
                            </div>
                          )}
                          <MiniBar label={`⚖ ${load.totalWeight.toFixed(1)}T / ${data.maxWeight}T`} pct={wPct}  color={wPct>95?P.danger:P.success}/>
                          <MiniBar label={`A: ${load.laneLength[0]}mm`} pct={l0Pct} color={load.laneLength[0]>loadTruckObj.maxLength?P.danger:P.accent}/>
                          <MiniBar label={`B: ${load.laneLength[1]}mm`} pct={l1Pct} color={load.laneLength[1]>loadTruckObj.maxLength?P.danger:P.laneB}/>
                        </div>
                        {/* Per-load truck selector */}
                        <div style={{marginTop:8,borderTop:`1px solid ${P.border}`,paddingTop:7}} onClick={e=>e.stopPropagation()}>
                          <div style={{fontSize:9,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Truck Type</div>
                          <select
                            value={loadTruckId}
                            onChange={e=>setLoadTrucks(lt=>({...lt,[load.number]:e.target.value}))}
                            style={{width:"100%",background:P.surface,border:`1px solid ${P.border}`,borderRadius:5,padding:"4px 6px",color:P.text,fontSize:11,outline:"none",cursor:"pointer"}}>
                            {TRUCK_TYPES.map(tt=>(
                              <option key={tt.id} value={tt.id}>{tt.label} ({tt.maxLength.toLocaleString()}mm)</option>
                            ))}
                          </select>
                        </div>

                      </div>
                    );
                  })}
                </div>

                {/* Detail */}
                {activeLoad&&(()=>{
                  const activeTruckId  = loadTrucks[activeLoad.number] || config.truckTypeId;
                  const activeTruckObj = TRUCK_TYPES.find(t=>t.id===activeTruckId) || truck;
                  const activeOverflow = activeLoad.laneLength[0] > activeTruckObj.maxLength || activeLoad.laneLength[1] > activeTruckObj.maxLength;
                  return (
                  <div style={{background:activeOverflow?"rgba(224,82,82,0.07)":P.card,border:`1px solid ${activeOverflow?P.danger:P.border}`,borderRadius:10,padding:16,transition:"all 0.2s"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                      <div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:activeOverflow?P.danger:P.accentLight}}>Load {activeLoad.number}</div>
                        <div style={{fontSize:12,color:P.muted,marginTop:2}}>Docket: {config.projectName}-RMK-{String(activeLoad.number).padStart(3,"0")}</div>
                        <div style={{fontSize:12,color:activeOverflow?P.danger:P.accentLight,marginTop:3,fontWeight:600}}>
                          {activeTruckObj.label}
                          <span style={{color:P.muted,fontWeight:400}}> · {activeTruckObj.maxLength.toLocaleString()} mm max lane</span>
                        </div>
                        {activeOverflow&&(
                          <div style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:6,background:"rgba(224,82,82,0.15)",border:`1px solid ${P.danger}`,borderRadius:5,padding:"4px 10px"}}>
                            <span style={{fontSize:13}}>⚠</span>
                            <span style={{fontSize:12,fontWeight:700,color:P.danger,letterSpacing:0.3}}>Review Truck Type</span>
                          </div>
                        )}
                      </div>
                      <Btn label={busy==="d"+activeLoad.number?"⏳ Generating…":"⬇ Download Docket PDF"}
                        bg={P.accent} tc="#000" onClick={()=>dlDocket(activeLoad)} disabled={!!busy}/>
                    </div>

                    {/* Stats */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
                      {[{label:"Panels",val:activeLoad.panels.length},{label:"Total Weight",val:activeLoad.totalWeight.toFixed(2)+" T"},{label:"Lane A used",val:activeLoad.laneLength[0]+" mm"},{label:"Lane B used",val:activeLoad.laneLength[1]+" mm"}].map(({label,val})=>(
                        <div key={label} style={{background:P.surface,borderRadius:7,padding:"10px 14px",border:`1px solid ${P.border}`}}>
                          <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:16,color:P.accentLight,marginTop:2}}>{val}</div>
                        </div>
                      ))}
                    </div>

                    {/* Load Date / Delivery Date / Carrier inputs */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                      {[
                        {label:"Load Date",     id:"ldpick-"+activeLoad.number, val:loadDates[activeLoad.number]||"",      setter:setLoadDates},
                        {label:"Delivery Date", id:"ddpick-"+activeLoad.number, val:loadDelivDates[activeLoad.number]||"", setter:setLoadDelivDates},
                      ].map(({label, id, val, setter})=>(
                        <div key={label}>
                          <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>{label}</div>
                          <div style={{position:"relative",display:"flex",alignItems:"center"}}>
                            <input type="text"
                              placeholder="DD/MM/YYYY"
                              value={val}
                              onChange={handleDateInput(setter, activeLoad.number)}
                              maxLength={10}
                              style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"7px 36px 7px 10px",color:P.text,fontSize:12,outline:"none",letterSpacing:1}}/>
                            <input id={id} type="date"
                              onChange={e=>{
                                if(!e.target.value) return;
                                const [y,m,d]=e.target.value.split("-");
                                setter(prev=>({...prev,[activeLoad.number]:`${d}/${m}/${y}`}));
                                e.target.value="";
                              }}
                              style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",width:24,height:24,opacity:0,cursor:"pointer",border:"none",padding:0,margin:0,zIndex:2}}/>
                            <span
                              style={{position:"absolute",right:8,cursor:"pointer",color:"#e8a020",fontSize:16,lineHeight:1,userSelect:"none",pointerEvents:"none",zIndex:1}}>📅</span>
                          </div>
                        </div>
                      ))}
                      <div>
                        <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Carrier</div>
                        <input type="text"
                          placeholder="Carrier name..."
                          value={loadCarriers[activeLoad.number]||""}
                          onChange={e=>setLoadCarriers(d=>({...d,[activeLoad.number]:e.target.value}))}
                          style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"7px 10px",color:P.text,fontSize:12,outline:"none"}}/>
                      </div>
                    </div>

                    {/* Truck visual */}
                    <div style={{marginBottom:14}}>
                      <div style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Truck Layout</div>
                      <div style={{background:P.surface,borderRadius:8,padding:10,border:`1px solid ${P.border}`,display:"flex",flexDirection:"column",gap:6}}>
                        {[0,1].map(li=>{
                          const lc = li===0?P.accent:P.laneB;
                          const lp = activeLoad.lanes[li];
                          const lu = activeLoad.laneLength[li];
                          return (
                            <div key={li}>
                              <div style={{fontSize:10,color:lc,marginBottom:3,fontWeight:600}}>LANE {li===0?"A":"B"} — {lu}mm / {truck.maxLength}mm</div>
                              <div style={{display:"flex",gap:2,height:32,background:P.bg,borderRadius:4,padding:2,overflow:"hidden"}}>
                                {lp.map(p=>{
                                  const pl=p.length;
                                  return (
                                    <div key={p.productId} title={`${p.productId} | ${pl}mm | ${p.mass.toFixed(1)}T`}
                                      style={{width:(pl/truck.maxLength*100)+"%",background:lc+"33",border:`1px solid ${lc}88`,borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:lc,fontFamily:"'IBM Plex Mono'",overflow:"hidden",whiteSpace:"nowrap",flexShrink:0,minWidth:18}}>
                                      {p.productId}
                                    </div>
                                  );
                                })}
                                {lu<truck.maxLength&&<div style={{flex:1,borderRadius:2,border:`1px dashed ${P.border}`}}/>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Lane tables */}
                    {[0,1].map(li=>{
                      const lp=activeLoad.lanes[li];
                      if(!lp.length) return null;
                      const lc=li===0?P.accent:P.laneB;
                      return (
                        <div key={li} style={{marginBottom:12}}>
                          <div style={{fontSize:11,color:lc,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                            Lane {li===0?"A":"B"} — {lp.length} panel{lp.length>1?"s":""}
                          </div>
                          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                            <thead>
                              <tr style={{background:P.surface}}>
                                {["Unload #","Panel ID","Length(mm)","Height(mm)","Mass(T)","Del. Seq"].map(h=>(
                                  <th key={h} style={{padding:"6px 10px",borderBottom:`2px solid ${lc}44`,textAlign:"center",color:P.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,fontSize:10}}>{h}</th>
                                ))}
                              </tr>
                            </thead>
                            <tbody>
                              {lp.map((panel,i)=>(
                                <tr key={panel.productId} style={{background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:lc,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{i+1}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",fontWeight:600,color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.productId}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.length}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.height}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.accentLight,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{panel.mass.toFixed(1)}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{panel.deliverySequence}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      );
                    })}
                  </div>
                );})()}
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
