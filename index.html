                  <Btn label="New File" bg="transparent" border={P.border} tc={P.muted} onClick={()=>{setStep("upload");setData(null);setLoads([]);setSideLifters({});setTopLifters({});setLoadTrucks({});setLoadDates({});setLoadDelivDates({});setLoadCarriers({});setPanelNotes({});setPanelTimeAtYard({});setPanelTimeOnSite({});setShowDispatchPreview(false);}}/>
                </div>
              </div>

              {/* ── DISPATCH SHEET PREVIEW (all loads) ── */}
              {showDispatchPreview && (() => {
                // Build all panels across all loads sorted by delivery sequence, mirroring the PDF
                const allDispRows = loads.flatMap(l =>
                  l.lanes.flatMap((lane, li) =>
                    lane.map(p => ({
                      ...p,
                      loadNumber: l.number,
                      lane: li===0?"A":li===1?"B":"C",
                      laneIdx: li,
                    }))
                  )
                ).sort((a,b) => a.deliverySequence - b.deliverySequence);

                const cellSt = { padding:"0", textAlign:"center", verticalAlign:"middle" };
                const inputSt = (accent) => ({
                  width:"100%", boxSizing:"border-box", background:"transparent",
                  border:"none", borderBottom:`1px solid ${accent}88`,
                  outline:"none", color:accent, fontSize:11,
                  fontFamily:"'IBM Plex Mono',monospace", padding:"5px 6px",
                  textAlign:"center",
                });

                const COLS = [
                  { label:"Product",       key:"product",    w:"9%"  },
                  { label:"Length mm",     key:"length",     w:"7%"  },
                  { label:"Height mm",     key:"height",     w:"7%"  },
                  { label:"Mass T",        key:"mass",       w:"6%"  },
                  { label:"Del. Seq",      key:"seq",        w:"5%"  },
                  { label:"Load No.",      key:"load",       w:"5%"  },
                  { label:"Lane",          key:"lane",       w:"4%"  },
                  { label:"Time at Yard",  key:"yard",       w:"9%"  },
                  { label:"Time on Site",  key:"site",       w:"9%"  },
                  { label:"Delivery Date", key:"deliv",      w:"10%", editable:true, accent:P.accentLight },
                  { label:"Trailer Type",  key:"trailer",    w:"12%", editable:true, accent:"#b07fea" },
                  { label:"Comment",       key:"comment",    w:"17%"  },
                ];

                const totalW = loads.reduce((s,l)=>s+l.totalWeight,0);
                let prevLoadNum = null;

                return (
                  <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:16}}>
                    {/* Header */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                      <div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:P.accentLight}}>
                          Dispatch Sheet Preview — {config.projectName}
                        </div>
                        <div style={{fontSize:12,color:P.muted,marginTop:2}}>
                          All {loads.length} loads · {allDispRows.length} panels · sorted by delivery sequence
                        </div>
                      </div>
                      <Btn label={busy==="dispatch"?"⏳ Generating…":"⬇ Export Dispatch PDF"} bg={P.highlight} border="#2a5f9e" tc={P.text} onClick={dlDispatch} disabled={!!busy}/>
                    </div>

                    {/* Editable column legend */}
                    <div style={{display:"flex",gap:16,marginBottom:10,flexWrap:"wrap",padding:"8px 12px",background:P.surface,borderRadius:7,border:`1px solid ${P.border}`}}>
                      <span style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,alignSelf:"center"}}>✎ Editable:</span>
                      {[
                        {label:"Delivery Date", accent:P.accentLight},
                        {label:"Trailer Type",  accent:"#b07fea"},
                      ].map(({label,accent})=>(
                        <div key={label} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
                          <div style={{width:3,height:14,background:accent,borderRadius:2}}/>
                          <span style={{color:accent,fontWeight:600}}>{label}</span>
                        </div>
                      ))}
                      <span style={{fontSize:10,color:P.muted,marginLeft:"auto",alignSelf:"center"}}>
                        Delivery Date &amp; Trailer Type apply per load · Times apply per panel
                      </span>
                    </div>

                    {/* Table */}
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                        <thead>
                          <tr style={{background:"#000"}}>
                            {COLS.map(col=>(
                              <th key={col.key} style={{
                                padding:"8px 6px", width:col.w,
                                textAlign:"center", fontWeight:700, textTransform:"uppercase",
                                letterSpacing:0.7, fontSize:9, whiteSpace:"nowrap",
                                color: col.editable ? col.accent : "#fff",
                                borderBottom: col.editable ? `2px solid ${col.accent}` : "2px solid #333",
                              }}>
                                {col.editable && "✎ "}{col.label}
                              </th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {allDispRows.map((p, i) => {
                            const isNewLoad = p.loadNumber !== prevLoadNum;
                            prevLoadNum = p.loadNumber;
                            const lc = p.laneIdx===0?P.accent:p.laneIdx===1?P.laneB:P.laneC;
                            const truckId  = loadTrucks[p.loadNumber] || config.truckTypeId;
                            const truckObj = TRUCK_TYPES.find(t=>t.id===truckId) || truck;
                            const overflowLoad = loads.find(l=>l.number===p.loadNumber);
                            const isOverflow = overflowLoad && (
                              overflowLoad.laneLength[0]>truckObj.maxLength ||
                              overflowLoad.laneLength[1]>truckObj.maxLength ||
                              overflowLoad.laneLength[2]>truckObj.maxLength
                            );
                            const commentParts = [];
                            if (isNewLoad && isOverflow) commentParts.push("⚠ Review Truck Type!");
                            if (sideLifters[p.productId]) commentParts.push("Top Lifters: "+(topLifters[p.productId]||"Front of Truck"));
                            if (panelNotes[p.productId]) commentParts.push(panelNotes[p.productId]);
                            const rowBg = i%2===0 ? "rgba(244,246,250,0.04)" : "transparent";

                            return (
                              <React.Fragment key={p.productId}>
                                {/* Load group separator row */}
                                {isNewLoad && i>0 && (
                                  <tr><td colSpan={COLS.length} style={{padding:0,height:2,background:"#000"}}/></tr>
                                )}
                                <tr style={{background:isNewLoad?"rgba(30,73,118,0.18)":rowBg}}>
                                  {/* Product */}
                                  <td style={{...cellSt,padding:"5px 8px",fontFamily:"'IBM Plex Mono'",fontWeight:700,color:P.text}}>{p.productId}</td>
                                  {/* Length */}
                                  <td style={{...cellSt,padding:"5px 6px",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{p.length}</td>
                                  {/* Height */}
                                  <td style={{...cellSt,padding:"5px 6px",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{p.height}</td>
                                  {/* Mass */}
                                  <td style={{...cellSt,padding:"5px 6px",color:P.accentLight,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{p.mass.toFixed(1)}</td>
                                  {/* Del Seq */}
                                  <td style={{...cellSt,padding:"5px 6px",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{p.deliverySequence}</td>
                                  {/* Load No — highlight on new load */}
                                  <td style={{...cellSt,padding:"5px 6px",background:isNewLoad?"rgba(220,230,241,0.15)":"transparent"}}>
                                    {isNewLoad && <span style={{fontFamily:"'IBM Plex Mono'",fontWeight:700,color:"#fff",fontSize:12}}>{p.loadNumber}</span>}
                                  </td>
                                  {/* Lane */}
                                  <td style={{...cellSt,padding:"5px 6px"}}>
                                    <span style={{color:lc,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{p.lane}</span>
                                  </td>
                                  {/* Time at Yard — read-only */}
                                  <td style={{...cellSt,padding:"5px 8px",color:P.muted,fontFamily:"'IBM Plex Mono'",fontSize:11}}>
                                    {panelTimeAtYard[p.productId]||<span style={{color:P.border}}>—</span>}
                                  </td>
                                  {/* Time on Site — read-only */}
                                  <td style={{...cellSt,padding:"5px 8px",color:P.muted,fontFamily:"'IBM Plex Mono'",fontSize:11}}>
                                    {panelTimeOnSite[p.productId]||<span style={{color:P.border}}>—</span>}
                                  </td>
                                  {/* Delivery Date — calendar picker per load */}
                                  <td style={{...cellSt,borderLeft:`2px solid ${P.accent}22`,background:"rgba(232,160,32,0.03)"}}>
                                    <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:loadDelivDates[p.loadNumber]?P.accentLight:P.border,padding:"5px 24px 5px 6px",cursor:"pointer",whiteSpace:"nowrap"}}>
                                        {loadDelivDates[p.loadNumber]||"DD/MM/YYYY"}
                                      </span>
                                      <span style={{position:"absolute",right:4,fontSize:13,color:P.accent,pointerEvents:"none",lineHeight:1}}>📅</span>
                                      <input type="date"
                                        onChange={e=>{
                                          if(!e.target.value) return;
                                          const [y,m,d]=e.target.value.split("-");
                                          setLoadDelivDates(v=>({...v,[p.loadNumber]:`${d}/${m}/${y}`}));
                                          e.target.value="";
                                        }}
                                        style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",border:"none",padding:0,margin:0}}/>
                                    </div>
                                  </td>
                                  {/* Trailer Type — editable per load */}
                                  <td style={{...cellSt,borderLeft:`2px solid #b07fea22`,background:"rgba(176,127,234,0.03)"}}>
                                    <select
                                      value={loadTrucks[p.loadNumber]||config.truckTypeId}
                                      onChange={e=>setLoadTrucks(lt=>({...lt,[p.loadNumber]:e.target.value}))}
                                      style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #b07fea88",outline:"none",color:"#b07fea",fontSize:10,fontFamily:"'IBM Plex Mono',monospace",padding:"5px 4px",cursor:"pointer",textAlign:"center"}}>
                                      {TRUCK_TYPES.map(tt=>(
                                        <option key={tt.id} value={tt.id}>{tt.label}</option>
                                      ))}
                                    </select>
                                  </td>
                                  {/* Comment */}
                                  <td style={{...cellSt,padding:"5px 8px",textAlign:"left",fontSize:10,
                                    color:commentParts[0]&&commentParts[0].startsWith("⚠")?P.danger:P.muted}}>
                                    {commentParts.join(" | ")||""}
                                  </td>
                                </tr>
                              </React.Fragment>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>

                    {/* Footer totals bar */}
                    <div style={{display:"flex",gap:0,marginTop:14,background:"#000",borderRadius:7,overflow:"hidden"}}>
                      {[
                        {label:"Total Panels",  val:String(allDispRows.length)},
                        {label:"Total Loads",   val:String(loads.length)},
                        {label:"Total Weight",  val:totalW.toFixed(1)+" T"},
                      ].map(({label,val},i)=>(
                        <div key={label} style={{flex:1,padding:"10px 0",textAlign:"center",borderRight:i<2?"1px solid #333":"none"}}>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                          <div style={{fontFamily:"'IBM Plex Mono'",fontSize:16,fontWeight:700,color:"#fff",marginTop:2}}>{val}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}

              {/* ── LOAD LIST + DETAIL GRID (hidden when dispatch preview open) ── */}
              {!showDispatchPreview && (
              <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>

                {/* Load list */}
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {loads.map(load=>{
                    const loadTruckId  = loadTrucks[load.number] || config.truckTypeId;
                    const loadTruckObj = TRUCK_TYPES.find(t => t.id === loadTruckId) || truck;
                    const wPct  = Math.min(100,(load.totalWeight/(parseFloat(config.maxWeight)||22.5))*100);
                    const l0Pct = Math.min(100,(load.laneLength[0]/loadTruckObj.maxLength)*100);
                    const l1Pct = Math.min(100,(load.laneLength[1]/loadTruckObj.maxLength)*100);
                    const l2Pct = Math.min(100,(load.laneLength[2]/loadTruckObj.maxLength)*100);
                    const laneOverflow = load.laneLength[0] > loadTruckObj.maxLength || load.laneLength[1] > loadTruckObj.maxLength || load.laneLength[2] > loadTruckObj.maxLength;
                    const active = activeLoad?.number===load.number;
                    return (
                      <div key={load.number}
                        style={{background:active?P.highlight:P.card,border:`1px solid ${laneOverflow?P.danger:active?P.accent:P.border}`,borderRadius:8,padding:"10px 12px",transition:"all 0.15s"}}>
                        <div onClick={()=>setActiveLoad(load)} style={{cursor:"pointer"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:laneOverflow?P.danger:active?P.accentLight:P.text}}>Load {load.number}</span>
                            <span style={{fontSize:11,color:P.muted}}>{load.panels.length} panels</span>
                          </div>
                          {laneOverflow&&(
                            <div style={{marginTop:4,marginBottom:2,fontSize:10,fontWeight:700,color:P.danger,letterSpacing:0.5}}>
                              ⚠ Review Truck Type
                            </div>
                          )}
                          <MiniBar label={`⚖ ${load.totalWeight.toFixed(1)}T / ${parseFloat(config.maxWeight)||22.5}T`} pct={wPct}  color={wPct>95?P.danger:P.success}/>
                          <MiniBar label={`A: ${load.laneLength[0]}mm`} pct={l0Pct} color={load.laneLength[0]>loadTruckObj.maxLength?P.danger:P.accent}/>
                          <MiniBar label={`B: ${load.laneLength[1]}mm`} pct={l1Pct} color={load.laneLength[1]>loadTruckObj.maxLength?P.danger:P.laneB}/>
                          <MiniBar label={`C: ${load.laneLength[2]}mm`} pct={l2Pct} color={load.laneLength[2]>loadTruckObj.maxLength?P.danger:P.laneC}/>
                        </div>
                        {/* Per-load truck selector */}
                        <div style={{marginTop:8,borderTop:`1px solid ${P.border}`,paddingTop:7}} onClick={e=>e.stopPropagation()}>
                          <div style={{fontSize:9,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Truck Type</div>
                          <select
                            value={loadTruckId}
                            onChange={e=>setLoadTrucks(lt=>({...lt,[load.number]:e.target.value}))}
                            style={{width:"100%",background:P.surface,border:`1px solid ${P.border}`,borderRadius:5,padding:"4px 6px",color:P.text,fontSize:11,outline:"none",cursor:"pointer"}}>
                            {TRUCK_TYPES.map(tt=>(
                              <option key={tt.id} value={tt.id}>{tt.label} ({tt.maxLength.toLocaleString()}mm)</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Detail */}
                {activeLoad&&(()=>{
                  const activeTruckId  = loadTrucks[activeLoad.number] || config.truckTypeId;
                  const activeTruckObj = TRUCK_TYPES.find(t=>t.id===activeTruckId) || truck;
                  const activeOverflow = activeLoad.laneLength[0] > activeTruckObj.maxLength || activeLoad.laneLength[1] > activeTruckObj.maxLength || activeLoad.laneLength[2] > activeTruckObj.maxLength;
                  return (
                  <div style={{background:activeOverflow?"rgba(224,82,82,0.07)":P.card,border:`1px solid ${activeOverflow?P.danger:P.border}`,borderRadius:10,padding:16,transition:"all 0.2s"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                      <div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:activeOverflow?P.danger:P.accentLight}}>Load {activeLoad.number}</div>
                        <div style={{fontSize:12,color:P.muted,marginTop:2}}>Docket: {config.projectName}-RMK-{String(activeLoad.number).padStart(3,"0")}</div>
                        <div style={{fontSize:12,color:activeOverflow?P.danger:P.accentLight,marginTop:3,fontWeight:600}}>
                          {activeTruckObj.label}
                          <span style={{color:P.muted,fontWeight:400}}> · {activeTruckObj.maxLength.toLocaleString()} mm max lane</span>
                        </div>
                        {activeOverflow&&(
                          <div style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:6,background:"rgba(224,82,82,0.15)",border:`1px solid ${P.danger}`,borderRadius:5,padding:"4px 10px"}}>
                            <span style={{fontSize:13}}>⚠</span>
                            <span style={{fontSize:12,fontWeight:700,color:P.danger,letterSpacing:0.3}}>Review Truck Type</span>
                          </div>
                        )}
                      </div>
                      <Btn label={busy==="d"+activeLoad.number?"⏳ Generating…":"⬇ Download Docket PDF"}
                        bg={P.accent} tc="#000" onClick={()=>dlDocket(activeLoad)} disabled={!!busy}/>
                    </div>

                    {/* Stats */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
                      {[{label:"Panels",val:activeLoad.panels.length},{label:"Total Weight",val:activeLoad.totalWeight.toFixed(2)+" T"},{label:"Lane A used",val:activeLoad.laneLength[0]+" mm"},{label:"Lane B used",val:activeLoad.laneLength[1]+" mm"},{label:"Lane C used",val:activeLoad.laneLength[2]+" mm"}].map(({label,val})=>(
                        <div key={label} style={{background:P.surface,borderRadius:7,padding:"10px 14px",border:`1px solid ${P.border}`}}>
                          <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:16,color:P.accentLight,marginTop:2}}>{val}</div>
                        </div>
                      ))}
                    </div>

                    {/* Load Date / Delivery Date / Carrier inputs */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                      {[
                        {label:"Load Date",     id:"ldpick-"+activeLoad.number, val:loadDates[activeLoad.number]||"",      setter:setLoadDates},
                        {label:"Delivery Date", id:"ddpick-"+activeLoad.number, val:loadDelivDates[activeLoad.number]||"", setter:setLoadDelivDates},
                      ].map(({label, id, val, setter})=>(
                        <div key={label}>
                          <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>{label}</div>
                          <div style={{position:"relative",display:"flex",alignItems:"center"}}>
                            <input type="text"
                              placeholder="DD/MM/YYYY"
                              value={val}
                              onChange={handleDateInput(setter, activeLoad.number)}
                              maxLength={10}
                              style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"7px 36px 7px 10px",color:P.text,fontSize:12,outline:"none",letterSpacing:1}}/>
                            <input id={id} type="date"
                              onChange={e=>{
                                if(!e.target.value) return;
                                const [y,m,d]=e.target.value.split("-");
                                setter(prev=>({...prev,[activeLoad.number]:`${d}/${m}/${y}`}));
                                e.target.value="";
                              }}
                              style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",width:24,height:24,opacity:0,cursor:"pointer",border:"none",padding:0,margin:0,zIndex:2}}/>
                            <span
                              style={{position:"absolute",right:8,cursor:"pointer",color:"#e8a020",fontSize:16,lineHeight:1,userSelect:"none",pointerEvents:"none",zIndex:1}}>📅</span>
                          </div>
                        </div>
                      ))}
                      <div>
                        <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Carrier</div>
                        <input type="text"
                          placeholder="Carrier name..."
                          value={loadCarriers[activeLoad.number]||""}
                          onChange={e=>setLoadCarriers(d=>({...d,[activeLoad.number]:e.target.value}))}
                          style={{width:"100%",boxSizing:"border-box",background:P.surface,border:`1px solid ${P.border}`,borderRadius:6,padding:"7px 10px",color:P.text,fontSize:12,outline:"none"}}/>
                      </div>
                    </div>

                    {/* Truck visual */}
                    <div style={{marginBottom:14}}>
                      <div style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Truck Layout</div>
                      <div style={{background:P.surface,borderRadius:8,padding:10,border:`1px solid ${P.border}`,display:"flex",flexDirection:"column",gap:6}}>
                        {[0,1,2].map(li=>{
                          const lc = li===0?P.accent:li===1?P.laneB:P.laneC;
                          const lp = activeLoad.lanes[li];
                          const lu = activeLoad.laneLength[li];
                          return (
                            <div key={li}>
                              <div style={{fontSize:10,color:lc,marginBottom:3,fontWeight:600}}>LANE {li===0?"A":li===1?"B":"C"} — {lu}mm / {truck.maxLength}mm</div>
                              <div style={{display:"flex",gap:2,height:32,background:P.bg,borderRadius:4,padding:2,overflow:"hidden"}}>
                                {lp.map(p=>{
                                  const pl=p.length;
                                  return (
                                    <div key={p.productId} title={`${p.productId} | ${pl}mm | ${p.mass.toFixed(1)}T`}
                                      style={{width:(pl/truck.maxLength*100)+"%",background:lc+"33",border:`1px solid ${lc}88`,borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:lc,fontFamily:"'IBM Plex Mono'",overflow:"hidden",whiteSpace:"nowrap",flexShrink:0,minWidth:18}}>
                                      {p.productId}
                                    </div>
                                  );
                                })}
                                {lu<truck.maxLength&&<div style={{flex:1,borderRadius:2,border:`1px dashed ${P.border}`}}/>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Lane tables */}
                    {[0,1,2].map(li=>{
                      const lp=activeLoad.lanes[li];
                      if(!lp.length) return null;
                      const lc=li===0?P.accent:li===1?P.laneB:P.laneC;
                      return (
                        <div key={li} style={{marginBottom:12}}>
                          <div style={{fontSize:11,color:lc,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                            Lane {li===0?"A":li===1?"B":"C"} — {lp.length} panel{lp.length>1?"s":""}
                          </div>
                          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                            <thead>
                              <tr style={{background:P.surface}}>
                                {["Unload #","Panel ID","Length(mm)","Height(mm)","Mass(T)","Del. Seq","Notes","Lane"].map(h=>(
                                  <th key={h} style={{padding:"6px 10px",borderBottom:`2px solid ${lc}44`,textAlign:"center",color:P.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,fontSize:10}}>{h}</th>
                                ))}
                              </tr>
                            </thead>
                            <tbody>
                              {lp.map((panel,i)=>(
                                <tr key={panel.productId} style={{background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:lc,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{i+1}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",fontWeight:600,color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.productId}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.length}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.text,fontFamily:"'IBM Plex Mono'"}}>{panel.height}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.accentLight,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{panel.mass.toFixed(1)}</td>
                                  <td style={{padding:"6px 10px",textAlign:"center",color:P.muted,fontFamily:"'IBM Plex Mono'"}}>{panel.deliverySequence}</td>
                                  <td style={{padding:"4px 8px"}}>
                                    <input type="text"
                                      placeholder="Add note..."
                                      value={panelNotes[panel.productId]||""}
                                      onChange={e=>setPanelNotes(n=>({...n,[panel.productId]:e.target.value}))}
                                      style={{width:"100%",minWidth:120,boxSizing:"border-box",background:"transparent",border:`1px solid ${P.border}`,borderRadius:4,padding:"3px 7px",color:P.text,fontSize:11,outline:"none"}}/>
                                  </td>
                                  <td style={{padding:"4px 6px",textAlign:"center"}}>
                                    <select
                                      value={li}
                                      onChange={e=>{ const to=parseInt(e.target.value); if(to!==li) movePanel(activeLoad.number,panel.productId,li,to); }}
                                      style={{background:P.surface,border:`1px solid ${P.border}`,borderRadius:4,padding:"2px 6px",color:P.text,fontSize:11,cursor:"pointer",outline:"none"}}>
                                      {[0,1,2].map(opt=>(
                                        <option key={opt} value={opt}>{opt===0?"A":opt===1?"B":"C"}</option>
                                      ))}
                                    </select>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      );
                    })}
                  </div>
                );})()}
              </div>
              )}
            </div>
          )}
        </div>
      </div>
    </>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
